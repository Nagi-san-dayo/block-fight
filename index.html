<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Super Fighting Fighter - Advanced Combo Edition</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #111; color: white; font-family: 'Impact', 'Arial Black', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden; user-select: none;
        }
        .game-wrapper {
            position: relative; width: 1280px; height: 720px;
            box-shadow: 0px 0px 40px rgba(0,0,0,0.8); border: 4px solid #444; background-color: #1a1a1a;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        /* UIレイアウト */
        .ui-container {
            position: absolute; top: 20px; left: 5%; width: 90%;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 10;
        }
        .bar-wrapper { width: 42%; }
        .hp-bar-container { height: 28px; background-color: #442222; border: 3px solid #fff; margin-bottom: 4px; overflow: hidden; }
        .hp-bar { height: 100%; background: linear-gradient(to bottom, #ffcc00, #ff6600); width: 100%; transition: width 0.05s ease-out; }
        
        .guard-bar-container { height: 8px; background-color: #333; border: 1px solid #777; margin-bottom: 4px; }
        .guard-bar { height: 100%; background-color: #00bfff; width: 100%; transition: width 0.1s ease-out; }
        .guard-crushed { background-color: #ff33cc !important; }

        .gauge-bar-container { height: 14px; background-color: #222; border: 2px solid #aaa; position: relative; }
        .gauge-bar { height: 100%; background: linear-gradient(to right, #00ffcc, #0099ff); width: 0%; }
        .gauge-text { position: absolute; right: 8px; top: -2px; font-size: 12px; font-weight: bold; color: #fff; text-shadow: 1px 1px #000; }
        
        .combo-counter { position: absolute; top: 100px; font-size: 36px; font-weight: bold; color: #ff3333; text-shadow: 3px 3px #000; opacity: 0; transition: opacity 0.2s; }
        #p1-combo { left: 5%; } #p2-combo { right: 5%; }
        .status-text { font-size: 18px; font-weight: bold; color: #00ffff; height: 22px; text-shadow: 1px 1px #000; }
        .frame-text { font-size: 14px; color: #ffcc00; }

        /* トレーニングモード用設定表示パネル */
        #training-panel {
            position: absolute; bottom: 80px; left: 5%; background: rgba(0,0,0,0.7);
            padding: 10px 20px; border-radius: 5px; border: 1px solid #555; font-family: Arial, sans-serif;
            font-size: 14px; color: #fff; display: none; z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div id="game-ui" class="ui-container" style="display: none;">
            <div class="bar-wrapper">
                <div id="p1-name" style="font-size:18px; text-shadow: 2px 2px #000;">PLAYER 1</div>
                <div class="hp-bar-container"><div id="p1-hp" class="hp-bar"></div></div>
                <div class="guard-bar-container"><div id="p1-guard" class="guard-bar"></div></div>
                <div class="gauge-bar-container">
                    <div id="p1-gauge" class="gauge-bar"></div>
                    <div id="p1-gauge-text" class="gauge-text">0 / 3</div>
                </div>
                <div id="p1-status" class="status-text"></div>
                <div id="p1-frame" class="frame-text"></div>
            </div>
            <div id="timer" style="font-size: 48px; color: #ffff00; font-weight: bold; text-shadow: 3px 3px #000; align-self: flex-start;">99</div>
            <div class="bar-wrapper" style="text-align: right;">
                <div id="p2-name" style="font-size:18px; text-shadow: 2px 2px #000;">CPU</div>
                <div class="hp-bar-container"><div id="p2-hp" class="hp-bar"></div></div>
                <div class="guard-bar-container"><div id="p2-guard" class="guard-bar"></div></div>
                <div class="gauge-bar-container">
                    <div id="p2-gauge" class="gauge-bar"></div>
                    <div id="p2-gauge-text" class="gauge-text">0 / 3</div>
                </div>
                <div id="p2-status" class="status-text"></div>
                <div id="p2-frame" class="frame-text"></div>
            </div>
            
            <div id="p1-combo" class="combo-counter">0 HIT!</div>
            <div id="p2-combo" class="combo-counter">0 HIT!</div>
        </div>

        <div id="training-panel">
            <strong style="color: #00ffcc;">TRAINING MODE CONTROL</strong><br>
            【Tキー】ダミー状態切替: <span id="dummy-state-text" style="color: #ffcc00; font-weight:bold;">STAND</span><br>
            ※体力・パワーゲージは自動で即座にMAXまで常時自動回復します。
        </div>

        <canvas id="gameCanvas" width="1280" height="720"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRAVITY = 0.8;
        const FLOOR_Y = canvas.height - 60;
        
        let gameMode = 'TITLE'; 
        let selectModeIndex = 0;
        let selectIndex = 0; 
        const CHAR_COLORS = ['#ffffff', '#ff3333', '#3366ff'];
        const CHAR_NAMES = ['RYU-WHITE', 'KEN-RED', 'RYU-BLUE'];

        let dummyStateSetting = 0;
        const DUMMY_STRINGS = ['立ち (IDLE)', 'しゃがみ (CROUCH)', '常時ガード (GUARD)', 'ジャストパリィ (PARRY)'];

        class Fireball {
            constructor(x, y, direction, owner, isEX = false, strength = 0) {
                this.x = x; this.y = y; 
                this.width = isEX ? 110 : 70; 
                this.height = isEX ? 90 : 60;
                this.speed = (isEX ? 14 : 7 + strength * 2.5) * direction; 
                this.owner = owner; 
                this.damage = isEX ? 6 : 8; 
                this.hitStun = isEX ? 30 : 22;
                this.guardStun = isEX ? 18 : 12; 
                this.hitType = 'high'; 
                this.isActive = true; 
                this.isEX = isEX; 
                this.hits = isEX ? 3 : 1; 
                this.knockdown = isEX; 
                this.launch = isEX; 
            }
            update() { 
                this.x += this.speed; 
                if (this.x < -100 || this.x > canvas.width + 100) this.isActive = false; 
            }
            draw() { 
                ctx.fillStyle = this.isEX ? '#cc33ff' : '#00f3ff'; 
                ctx.beginPath();
                ctx.ellipse(this.x + this.width/2, this.y + this.height/2, this.width/2, this.height/2, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Fighter {
            constructor({ x, y, color, isCPU, name }) {
                this.x = x; this.y = y; this.baseHeight = 220; this.height = this.baseHeight; this.width = 100;
                this.vx = 0; this.vy = 0; this.color = color; this.isCPU = isCPU; this.name = name;
                this.hp = 100; this.meter = 0.0; 
                this.guardShield = 100; this.isGuardCrushed = false; this.guardCrushTimer = 0;
                this.facing = 1; this.isGrounded = false; this.state = 'idle'; this.stateTimer = 0;
                this.hitstopTimer = 0; // ヒットストップ用タイマー
                this.currentAttack = null; this.hasHitThisAttack = false; this.comboCount = 0; this.comboTimer = 0;
                this.attackBox = { x: 0, y: 0, width: 0, height: 0 }; this.isCrouching = false; 
                this.invincible = false; this.invincibleTimer = 0;
                this.cpuGuardType = null; this.multihitCount = 0; this.multihitTimer = 0;
                this.tatsuSpeed = 0;
            }

            addMeter(amount) {
                this.meter = Math.min(3.0, this.meter + amount);
                const id = this.isCPU ? 'p2' : 'p1';
                document.getElementById(`${id}-gauge`).style.width = (this.meter / 3.0 * 100) + '%';
                document.getElementById(`${id}-gauge-text`).innerText = `${this.meter.toFixed(1)} / 3`;
            }

            updateGuardShield(amount) {
                if (this.isGuardCrushed) return;
                this.guardShield = Math.max(0, this.guardShield + amount);
                if (this.guardShield <= 0) {
                    this.isGuardCrushed = true; this.guardCrushTimer = 240; 
                    document.getElementById(this.isCPU ? 'p2-guard' : 'p1-guard').classList.add('guard-crushed');
                }
                document.getElementById(this.isCPU ? 'p2-guard' : 'p1-guard').style.width = this.guardShield + '%';
            }

            draw() {
                if (this.isGuardCrushed) ctx.fillStyle = '#ff33cc'; 
                else if (this.invincible && this.state !== 'knockdown') ctx.fillStyle = '#ffff66'; 
                else if (this.state === 'knockdown') ctx.fillStyle = '#884444'; 
                else if (this.state === 'air_hit') ctx.fillStyle = '#ff66cc'; // 空中食らい時の色
                else if (this.state === 'hitstun') ctx.fillStyle = '#ff4444';
                else if (this.state === 'guardstun') ctx.fillStyle = '#44ff44';
                else if (this.state === 'attack') ctx.fillStyle = '#ffaa00';
                else {
                    if (!this.isCPU && activeMoveKey === 'x') ctx.fillStyle = '#ffffff';
                    else if (!this.isCPU && (activeMoveKey === 'a' || activeMoveKey === 'z')) ctx.fillStyle = '#00ffff';
                    else ctx.fillStyle = this.color;
                }
                
                let drawHeight = this.state === 'knockdown' ? this.baseHeight * 0.3 : this.height;
                let drawY = this.state === 'knockdown' ? this.y + (this.baseHeight - drawHeight) : this.y;
                
                ctx.fillRect(this.x, drawY, this.width, drawHeight);
                
                ctx.fillStyle = '#000';
                let eyeX = this.facing === 1 ? this.x + this.width - 25 : this.x + 15;
                if(this.state !== 'knockdown') ctx.fillRect(eyeX, drawY + 25, 15, 15);

                if (this.state === 'attack' && this.attackBox.width > 0) {
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
                    ctx.fillRect(this.attackBox.x, this.attackBox.y, this.attackBox.width, this.attackBox.height);
                }
            }

            update(currentDirNum) {
                // ヒットストップ時はフレーム進行（タイマーや移動）を完全に停止
                if (this.hitstopTimer > 0) {
                    this.hitstopTimer--;
                    return; 
                }

                if (this.invincibleTimer > 0) {
                    this.invincibleTimer--;
                    this.invincible = true;
                } else if (this.state === 'idle' && !this.currentAttack) {
                    this.invincible = false;
                }

                if (this.isGuardCrushed) {
                    this.guardCrushTimer--;
                    if (this.guardCrushTimer <= 0) {
                        this.isGuardCrushed = false; this.guardShield = 100;
                        document.getElementById(this.isCPU ? 'p2-guard' : 'p1-guard').classList.remove('guard-crushed');
                    }
                } else if (this.state === 'idle' && this.guardShield < 100) {
                    this.guardShield = Math.min(100, this.guardShield + 0.1);
                    document.getElementById(this.isCPU ? 'p2-guard' : 'p1-guard').style.width = this.guardShield + '%';
                }

                const disableCrouchStates = ['attack', 'hitstun', 'guardstun', 'knockdown', 'air_hit'];
                if (!disableCrouchStates.includes(this.state) && [1, 2, 3].includes(currentDirNum)) {
                    this.isCrouching = true; this.height = this.baseHeight * 0.7;
                } else if (!disableCrouchStates.includes(this.state)) {
                    this.isCrouching = false; this.height = this.baseHeight;
                }

                if (this.state === 'attack' && this.currentAttack && this.currentAttack.name.includes('竜巻')) {
                    this.vx = this.tatsuSpeed;
                    if (this.vy > 0 && !this.isGrounded) this.vy = 0; 
                }

                this.y += this.vy;
                if (this.y + this.height >= FLOOR_Y) {
                    this.y = FLOOR_Y - this.height; 
                    this.vy = 0; 
                    this.isGrounded = true;
                    
                    if (this.state === 'air_hit') {
                        // 空中吹き飛びから地面に触れた瞬間にダウンステートへ移行
                        this.state = 'knockdown';
                        this.stateTimer = 50; // 起き上がりまでの寝っぱなし時間
                        this.vx = 0;
                    } else if (this.state === 'knockdown') {
                        this.vx = 0; 
                    }
                } else { 
                    this.vy += GRAVITY; 
                    this.isGrounded = false; 
                }

                this.x += this.vx;
                if (this.x < 0) this.x = 0; if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;

                if (this.multihitCount > 0) {
                    this.multihitTimer--;
                    if (this.multihitTimer <= 0) {
                        this.multihitTimer = 7; this.multihitCount--; this.hasHitThisAttack = false; 
                        let target = this.isCPU ? player1 : player2;
                        if (checkCollision(this.attackBox, target)) {
                            target.evaluateHit(this.currentAttack, 'high'); this.hasHitThisAttack = true; this.addMeter(0.05);
                        }
                    }
                }

                if (this.stateTimer > 0) {
                    this.stateTimer--;
                    if (this.stateTimer === 0) { 
                        if (this.state === 'knockdown') {
                            this.state = 'idle';
                            this.invincibleTimer = 20; 
                            this.height = this.baseHeight;
                        } else {
                            this.state = 'idle'; this.currentAttack = null; this.multihitCount = 0;
                            this.attackBox = { x: 0, y: 0, width: 0, height: 0 };
                        }
                    }
                }

                if (this.state === 'attack' && this.currentAttack && !this.currentAttack.isProjectile) {
                    const data = this.currentAttack;
                    this.attackBox.width = data.width; this.attackBox.height = data.height;
                    this.attackBox.y = this.y + data.offsetY;
                    this.attackBox.x = this.facing === 1 ? this.x + data.offsetX : this.x - data.width + (this.width - data.offsetX);
                }

                if (this.comboTimer > 0) {
                    this.comboTimer--;
                    if (this.comboTimer === 0) {
                        this.comboCount = 0;
                        document.getElementById(this.isCPU ? 'p2-combo' : 'p1-combo').style.opacity = 0;
                    }
                }
            }

            startNormalAttack(btnType, dirNum) {
                if (this.state === 'hitstun' || this.state === 'guardstun' || this.state === 'knockdown' || this.state === 'air_hit') return;

                let isPunch = ['j', 'k', 'l'].includes(btnType);
                let isKick = ['u', 'i', 'o'].includes(btnType);
                
                let strengthNum = ['j', 'u'].includes(btnType) ? 0 : (['k', 'i'].includes(btnType) ? 1 : 2); 
                let strengthName = ['弱', '中', '強'][strengthNum];
                let typeName = isPunch ? 'P' : 'K';
                
                let isCrouching = [1, 2, 3].includes(dirNum) && this.isGrounded;
                let isJumping = !this.isGrounded;
                
                let isRapid = (this.state === 'attack' && this.hasHitThisAttack && this.currentAttack && this.currentAttack.rapidCancelable && strengthNum === 0);
                let isStartup = (this.state === 'attack' && this.currentAttack && this.stateTimer > (this.currentAttack.active + this.currentAttack.rec));
                let isAirborne = (!this.isGrounded && this.state !== 'idle');
                
                if (this.state !== 'idle' && this.isGrounded && !isRapid && !isStartup) return;
                if (isAirborne) return;

                let stanceName = isJumping ? 'ジャンプ' : (isCrouching ? 'しゃがみ' : '立ち');
                let name = `${stanceName}${strengthName}${typeName}`;
                let type = isCrouching ? (isKick ? 'low' : 'high') : (isJumping ? 'overhead' : 'high');
                
                let isOverhead = !isJumping && !isCrouching && isPunch && strengthNum === 1 && (this.facing === 1 ? dirNum === 6 : dirNum === 4);
                if (isOverhead) { name = '鎖骨割り'; type = 'overhead'; }

                let isSweep = isCrouching && isKick && strengthNum === 2;
                if (isSweep) { name = '足払い(屈強K)'; }

                this.state = 'attack'; this.hasHitThisAttack = false;
                
                let dmg = 4 + (strengthNum * 4); 
                let startup = 3 + (strengthNum * 2);
                let active = 3 + (strengthNum * 2);
                let rec = 6 + (strengthNum * 5); 
                let hStun = 14 + (strengthNum * 5); 
                let gStun = 10 + (strengthNum * 3);
                
                this.currentAttack = { 
                    name: name, damage: dmg, 
                    width: 100 + (strengthNum * 30), height: isJumping ? 60 : 40, 
                    offsetX: 50 + (strengthNum * 15), offsetY: isCrouching ? 120 : (isJumping ? 150 : 50), 
                    rec: rec, active: active, hitStun: hStun, guardStun: gStun, hitType: type,
                    cancelable: (strengthNum < 2), 
                    rapidCancelable: (strengthNum === 0), 
                    knockdown: isSweep,
                    launch: false // 足払いはその場で即ダウン
                };
                
                this.stateTimer = startup + active + rec;
                document.getElementById(this.isCPU ? 'p2-status' : 'p1-status').innerText = name;
            }

            tryThrow() {
                if (this.state !== 'idle' || !this.isGrounded) return false;
                let target = this.isCPU ? player1 : player2;
                let dist = Math.abs((this.x + this.width/2) - (target.x + target.width/2));
                
                if (dist < 140 && target.isGrounded && target.state !== 'hitstun' && !target.invincible && target.state !== 'knockdown' && target.state !== 'air_hit') {
                    this.state = 'attack'; this.stateTimer = 30; this.vx = 0;
                    document.getElementById(this.isCPU ? 'p2-status' : 'p1-status').innerText = '背負い投げ!';
                    
                    target.state = 'knockdown'; target.stateTimer = 40;
                    target.hp = Math.max(0, target.hp - 12); 
                    target.x += this.facing * 180; target.vy = -8; target.vx = 0;
                    
                    document.getElementById(target.isCPU ? 'p2-hp' : 'p1-hp').style.width = target.hp + '%';
                    displayFrameAdvantage(this, target, 10);
                    return true;
                }
                return false;
            }

            startSpecialAttack(moveName, strength) {
                if (this.state === 'hitstun' || this.state === 'guardstun' || this.state === 'knockdown' || this.state === 'air_hit') return;
                
                // キャンセル処理の判定
                if (this.state === 'attack') {
                    if (this.currentAttack && !this.currentAttack.isProjectile) {
                        let isStartup = this.stateTimer > (this.currentAttack.active + this.currentAttack.rec); 
                        let canHitCancel = this.hasHitThisAttack && this.currentAttack.cancelable;
                        
                        // 【新仕様】通常昇竜拳のヒットストップ中のみ、EX昇竜拳(strength:3)へのキャンセルを特別に許可
                        let isShoryuToEXCancel = this.currentAttack.name.includes('昇龍拳') && !this.currentAttack.name.includes('EX') && this.hitstopTimer > 0 && strength === 3;

                        if (!isStartup && !canHitCancel && !isShoryuToEXCancel) return; 
                    } else { return; }
                }

                // キャンセルが成立した場合はヒットストップを即座に踏み倒して発動
                this.hitstopTimer = 0;
                this.state = 'attack'; this.hasHitThisAttack = false; this.vx = 0;
                const statusId = this.isCPU ? 'p2-status' : 'p1-status';

                if (moveName === 'hadouken') {
                    let isSuper = strength === 3; 
                    this.currentAttack = { 
                        name: isSuper ? '真空波動拳(1G)' : ['弱 波動拳','中 波動拳','強 波動拳'][strength], 
                        isProjectile: true, hitStun: isSuper ? 40 : 22, guardStun: isSuper ? 24 : 12, knockdown: isSuper, launch: isSuper
                    };
                    this.stateTimer = isSuper ? 45 : 30; 
                    let spawnX = this.facing === 1 ? this.x + this.width + 10 : this.x - 80;
                    projectiles.push(new Fireball(spawnX, this.y + 30, this.facing, this, isSuper, strength));
                    document.getElementById(statusId).innerText = this.currentAttack.name;
                } 
                else if (moveName === 'shoryuken') {
                    let isEX = strength === 3;
                    let jumpHeight = isEX ? -22 : -16 - strength * 2;
                    this.vy = jumpHeight; this.invincibleTimer = 8; 
                    
                    this.currentAttack = { 
                        name: isEX ? 'EX昇龍拳(1G)' : ['弱 昇龍拳','中 昇龍拳','強 昇龍拳'][strength], 
                        damage: isEX ? 8 : 12 + strength * 2, width: 120, height: 200, offsetX: 50, offsetY: -50, 
                        rec: 30, hitStun: 35, guardStun: 10, knockdown: true, launch: true // launch(打ち上げ)属性を適用
                    };
                    // 通常昇竜拳の全体硬直を長め(60)に設定し、キャンセルしなかった場合は着地まで何も繋がらないように調整
                    this.stateTimer = isEX ? 50 : 60; 
                    this.vx = this.facing * (isEX ? 4 : 2 + strength);

                    if (isEX) { this.multihitCount = 2; this.multihitTimer = 5; } 
                    document.getElementById(statusId).innerText = this.currentAttack.name;
                } 
                else if (moveName === 'tatsumaki') {
                    let isEX = strength === 3;
                    this.currentAttack = { 
                        name: isEX ? '真空竜巻旋風脚(1G)' : ['弱 竜巻旋風脚','中 竜巻旋風脚','強 竜巻旋風脚'][strength], 
                        damage: isEX ? 5 : 10 + strength, width: 150, height: 80, offsetX: -20, offsetY: 40, 
                        rec: 6, hitStun: 26, guardStun: 15, knockdown: true, launch: true // launch(打ち上げ)属性を適用
                    };
                    // 画面端でヒット後に昇竜拳が繋がるよう全体の硬直フレーム(stateTimer)をコンパクトに調整
                    this.stateTimer = isEX ? 50 : 20 + strength * 4;
                    this.vy = -6; 
                    this.tatsuSpeed = this.facing * (isEX ? 9 : 6 + strength); 
                    if (isEX) { this.multihitCount = 4; this.multihitTimer = 10; } 
                    document.getElementById(statusId).innerText = this.currentAttack.name;
                }
            }

            evaluateHit(attack, hitType) {
                if (this.invincible && this.state !== 'air_hit') return; // 空中食らい中は追撃可能

                let isGuarded = false; let isParried = false;
                if (this.isCPU) {
                    if (this.cpuGuardType === 'x') isParried = true;
                    else if (this.cpuGuardType === 'a' && hitType !== 'low') isGuarded = true;
                    else if (this.cpuGuardType === 'z' && hitType !== 'overhead') isGuarded = true;
                } else {
                    if (activeMoveKey === 'x') isParried = true;
                    else if (activeMoveKey === 'a' && hitType !== 'low') isGuarded = true;
                    else if (activeMoveKey === 'z' && hitType !== 'overhead') isGuarded = true;
                }

                const statusId = this.isCPU ? 'p2-status' : 'p1-status';
                let attacker = this.isCPU ? player1 : player2;

                // 【新仕様】ヒットストップの付与 (攻撃側・防御側の両方を数フレームフリーズさせる)
                let stopFrames = 8;
                if (attack.name.includes('弱')) stopFrames = 5;
                if (attack.name.includes('強')) stopFrames = 11;
                if (attack.name.includes('昇龍') || attack.name.includes('竜巻')) stopFrames = 12;
                if (attack.isProjectile) stopFrames = 4;

                this.hitstopTimer = stopFrames;
                attacker.hitstopTimer = stopFrames;

                if (isParried) {
                    document.getElementById(statusId).innerText = 'JUST PARRIED!';
                    this.x -= this.facing * 5; this.addMeter(0.15);
                    displayFrameAdvantage(attacker, this, -15); 
                    return;
                }

                if (isGuarded) {
                    let finalGuardStun = attack.guardStun;
                    if (this.isGuardCrushed) {
                        document.getElementById(statusId).innerText = 'CRUSH GUARD!';
                        this.hp = Math.max(0, this.hp - Math.floor(attack.damage * 0.4)); 
                        finalGuardStun = Math.floor(attack.guardStun * 1.5);
                    } else {
                        document.getElementById(statusId).innerText = 'GUARD!';
                        this.updateGuardShield(-15); 
                    }

                    this.state = 'guardstun'; this.stateTimer = finalGuardStun;
                    
                    // 【新仕様】画面端の永久ハメ防止対策（プッシュバック）
                    let pushDist = 12;
                    if (this.x <= 0 || this.x + this.width >= canvas.width) {
                        attacker.x -= attacker.facing * pushDist; // 防御側が端なら攻撃側が押し戻される
                    } else {
                        this.x -= this.facing * pushDist;
                    }
                    
                    this.addMeter(0.04);
                    let diff = finalGuardStun - attacker.stateTimer;
                    displayFrameAdvantage(attacker, this, diff);
                    return;
                }

                // ヒット時の処理
                this.hp = Math.max(0, this.hp - attack.damage);
                document.getElementById(this.isCPU ? 'p2-hp' : 'p1-hp').style.width = this.hp + '%';
                this.addMeter(0.08); 

                this.comboCount++; this.comboTimer = attack.hitStun + 50;
                const comboId = this.isCPU ? 'p2-combo' : 'p1-combo';
                const comboEl = document.getElementById(comboId);
                if (this.comboCount > 1) { comboEl.innerText = `${this.comboCount} HIT!`; comboEl.style.opacity = 1; }

                // 【新仕様】画面端ハメ防止（ヒット時プッシュバック）
                let hitPushDist = 16;
                if (this.x <= 0 || this.x + this.width >= canvas.width) {
                    attacker.x -= attacker.facing * hitPushDist;
                } else {
                    this.x -= this.facing * hitPushDist;
                }

                if (attack.knockdown) {
                    if (attack.launch) {
                        // 【新仕様】昇竜拳や竜巻旋風脚による空中打ち上げ挙動
                        document.getElementById(statusId).innerText = 'LAUNCH!';
                        this.state = 'air_hit';
                        this.vy = -15; // 上方向へ吹き飛ばす
                        this.vx = -this.facing * 2; 
                        this.stateTimer = 999; // 着地するまでタイマーで状態が解けないように大きな値を設定
                    } else {
                        // 足払いなどは従来どおりその場で即ダウン
                        document.getElementById(statusId).innerText = 'KNOCKDOWN!';
                        this.state = 'knockdown';
                        this.stateTimer = 50;
                        this.vy = -6;
                        this.vx = -this.facing * 5;
                    }
                    this.multihitCount = 0;
                } else {
                    document.getElementById(statusId).innerText = 'HIT!';
                    this.state = 'hitstun'; this.stateTimer = attack.hitStun; this.multihitCount = 0;
                }

                let diff = attack.hitStun - attacker.stateTimer;
                displayFrameAdvantage(attacker, this, diff);
            }
        }

        function displayFrameAdvantage(attacker, defender, diff) {
            const p1El = document.getElementById('p1-frame');
            const p2El = document.getElementById('p2-frame');
            if (diff === 0) {
                p1El.innerText = '±0F (五分)'; p2El.innerText = '±0F (五分)';
                p1El.style.color = p2El.style.color = '#fff';
            } else if (diff > 0) {
                if (!attacker.isCPU) {
                    p1El.innerText = `+${diff}F 有利`; p1El.style.color = '#00ff00';
                    p2El.innerText = `-${diff}F 不利`; p2El.style.color = '#ff3333';
                } else {
                    p2El.innerText = `+${diff}F 有利`; p2El.style.color = '#00ff00';
                    p1El.innerText = `-${diff}F 不利`; p1El.style.color = '#ff3333';
                }
            } else {
                if (!attacker.isCPU) {
                    p1El.innerText = `${diff}F 不利`; p1El.style.color = '#ff3333';
                    p2El.innerText = `+${Math.abs(diff)}F 有利`; p2El.style.color = '#00ff00';
                } else {
                    p2El.innerText = `${diff}F 不利`; p2El.style.color = '#ff3333';
                    p1El.innerText = `+${Math.abs(diff)}F 有利`; p1El.style.color = '#00ff00';
                }
            }
        }

        let player1; let player2; let projectiles = [];
        let matchTimer = 99; let matchTimerInterval;

        let activeMoveKey = null; const moveKeyStack = [];
        function getJoystickDirection() {
            switch (activeMoveKey) {
                case 'z': return 1; case 'x': return 2; case 'c': return 3;
                case 'a': return 4; case 'd': return 6;
                case 'q': return 7; case 'w': return 8; case 'e': return 9;
                default:  return 5;
            }
        }
        let inputBuffer = [];
        function checkCollision(rect1, rect2) {
            return (rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x &&
                    rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y);
        }

        let cpuTimer = 0;
        function updateCPU() {
            if (player2.state === 'hitstun' || player2.state === 'guardstun' || player2.state === 'knockdown' || player2.state === 'air_hit') return;
            player2.facing = player1.x > player2.x ? 1 : -1;
            const dist = Math.abs(player1.x - player2.x);
            player2.cpuGuardType = null;

            if (selectModeIndex === 0) {
                if (player2.state === 'idle') {
                    if (player1.state === 'attack' && dist < 260) {
                        player2.cpuGuardType = Math.random() < 0.12 ? 'x' : (Math.random() < 0.5 ? 'z' : 'a');
                        player2.vx = 0; return;
                    }
                    if (dist > 180) player2.vx = player2.facing * 3.5;
                    else if (dist < 90) {
                        if (Math.random() < 0.15) { if (player2.tryThrow()) return; }
                        player2.vx = -player2.facing * 2.5;
                    }
                    else player2.vx = 0;

                    cpuTimer--;
                    if (cpuTimer <= 0) {
                        cpuTimer = 40 + Math.random() * 40;
                        if (dist < 160) {
                            if (player2.meter >= 2.0 && Math.random() < 0.4) { player2.meter -= 2.0; player2.startSpecialAttack('shoryuken', 3); 
                            } else { player2.startSpecialAttack('shoryuken', Math.floor(Math.random()*3)); }
                        } else {
                            if (player2.meter >= 1.0 && Math.random() < 0.3) { player2.meter -= 1.0; player2.startSpecialAttack('hadouken', 3);
                            } else { player2.startSpecialAttack('hadouken', Math.floor(Math.random()*3)); }
                        }
                    }
                }
            } 
            else {
                player2.vx = 0; 
                if (player1.state === 'attack' && dist < 350) {
                    if (dummyStateSetting === 2) {
                        player2.cpuGuardType = (player1.currentAttack && player1.currentAttack.hitType === 'low') ? 'z' : 'a';
                    } else if (dummyStateSetting === 3) {
                        player2.cpuGuardType = 'x'; 
                    }
                }
            }
        }

        function startBattle() {
            gameMode = 'BATTLE';
            document.getElementById('game-ui').style.display = 'flex';
            
            if (selectModeIndex === 1) {
                document.getElementById('training-panel').style.display = 'block';
                document.getElementById('timer').innerText = '∞';
            } else {
                document.getElementById('training-panel').style.display = 'none';
                matchTimer = 99; document.getElementById('timer').innerText = matchTimer;
            }
            
            player1 = new Fighter({ x: 250, y: 0, color: CHAR_COLORS[selectIndex], isCPU: false, name: CHAR_NAMES[selectIndex] });
            let cpuColorIndex = (selectIndex + 1) % CHAR_COLORS.length;
            player2 = new Fighter({ x: 900, y: 0, color: CHAR_COLORS[cpuColorIndex], isCPU: true, name: CHAR_NAMES[cpuColorIndex] });
            
            document.getElementById('p1-name').innerText = player1.name;
            document.getElementById('p2-name').innerText = player2.name + (selectModeIndex === 1 ? ' (DUMMY)' : ' (CPU)');
            
            clearInterval(matchTimerInterval);
            if (selectModeIndex === 0) {
                matchTimerInterval = setInterval(() => {
                    if (gameMode === 'BATTLE') {
                        matchTimer--; document.getElementById('timer').innerText = matchTimer;
                        if (matchTimer <= 0) { gameMode = 'GAME_OVER'; clearInterval(matchTimerInterval); }
                    }
                }, 1000);
            }
        }

        function animate() {
            window.requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#222'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#444'; ctx.fillRect(0, FLOOR_Y, canvas.width, canvas.height - FLOOR_Y);

            if (gameMode === 'TITLE') {
                ctx.fillStyle = '#ffcc00'; ctx.font = '68px Impact'; ctx.textAlign = 'center';
                ctx.fillText('SUPER FIGHTING FIGHTER', canvas.width / 2, 260);
                ctx.fillStyle = '#ffffff'; ctx.font = '28px Arial';
                ctx.fillText('PRESS SPACE KEY TO START', canvas.width / 2, 420);
                return;
            }

            if (gameMode === 'MODE_SELECT') {
                ctx.fillStyle = '#ffffff'; ctx.font = '48px Impact'; ctx.textAlign = 'center';
                ctx.fillText('SELECT GAME MODE', canvas.width / 2, 180);

                const modes = ['1. ARCADE BATTLE', '2. TRAINING MODE'];
                for(let i=0; i<2; i++) {
                    ctx.fillStyle = (selectModeIndex === i) ? '#00ffff' : '#666';
                    ctx.font = (selectModeIndex === i) ? '36px Arial Black' : '30px Arial';
                    ctx.fillText((selectModeIndex === i ? '➔ ' : '') + modes[i], canvas.width / 2, 320 + i * 80);
                }
                ctx.fillStyle = '#ffcc00'; ctx.font = '20px Arial';
                ctx.fillText('W / X: SELECT  |  SPACE: CONFIRM', canvas.width / 2, 540);
                return;
            }

            if (gameMode === 'CHAR_SELECT') {
                ctx.fillStyle = '#ffffff'; ctx.font = '42px Impact'; ctx.textAlign = 'center';
                ctx.fillText('SELECT YOUR CHARACTER', canvas.width / 2, 120);

                for (let i = 0; i < 3; i++) {
                    let boxX = 280 + i * 260; let boxY = 280;
                    ctx.strokeStyle = (selectIndex === i) ? '#ffcc00' : '#555';
                    ctx.lineWidth = (selectIndex === i) ? 6 : 2;
                    ctx.strokeRect(boxX, boxY, 200, 200);
                    ctx.fillStyle = CHAR_COLORS[i]; ctx.fillRect(boxX + 10, boxY + 10, 180, 180);
                    ctx.fillStyle = '#fff'; ctx.font = '20px Arial';
                    ctx.fillText(CHAR_NAMES[i], boxX + 100, boxY + 230);
                }
                ctx.fillStyle = '#ffcc00'; ctx.font = '22px Arial';
                ctx.fillText('A or D: MOVE  /  SPACE: CONFIRM', canvas.width / 2, 600);
                return;
            }

            if (gameMode === 'GAME_OVER') {
                ctx.fillStyle = '#ff3333'; ctx.font = '72px Impact'; ctx.textAlign = 'center';
                let msg = 'GAME OVER';
                if (player1.hp <= 0 && player2.hp <= 0) msg = 'DRAW';
                else if (player1.hp <= 0) msg = 'CPU WIN';
                else if (player2.hp <= 0) msg = 'YOU WIN';
                ctx.fillText(msg, canvas.width / 2, 300);
                ctx.fillStyle = '#fff'; ctx.font = '24px Arial';
                ctx.fillText('PRESS SPACE TO RETURN TO TITLE', canvas.width / 2, 440);
            }

            if (selectModeIndex === 1 && gameMode === 'BATTLE') {
                if (player1.hp < 100) { player1.hp = 100; document.getElementById('p1-hp').style.width = '100%'; }
                if (player2.hp < 100) { player2.hp = 100; document.getElementById('p2-hp').style.width = '100%'; }
                if (player1.meter < 3.0) { player1.addMeter(0.1); }
                if (player2.meter < 3.0) { player2.addMeter(0.1); }
            }

            let p1Dir = getJoystickDirection();
            if (gameMode === 'BATTLE' && selectModeIndex === 1 && dummyStateSetting === 1) {
                updateCPU(); player2.update(2); 
            } else {
                updateCPU(); player2.update(5);
            }

            const disableMoveStates = ['attack', 'hitstun', 'guardstun', 'knockdown', 'air_hit'];
            if (!disableMoveStates.includes(player1.state)) {
                player1.facing = player1.x < player2.x ? 1 : -1;
                if ([7, 8, 9].includes(p1Dir) && player1.isGrounded) player1.vy = -18;
                if ([1, 4, 7].includes(p1Dir)) player1.vx = -6; else if ([3, 6, 9].includes(p1Dir)) player1.vx = 6; else player1.vx = 0;
            } else if (player1.state !== 'attack' || !player1.currentAttack || !player1.currentAttack.name.includes('竜巻')) { 
                if(player1.state === 'attack' && player1.isGrounded) player1.vx = 0; 
            }

            player1.update(p1Dir);

            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i]; p.update(); p.draw();
                let target = p.owner === player1 ? player2 : player1;
                if (checkCollision(p, target) && p.isActive) {
                    target.evaluateHit(p, p.hitType); p.hits--; if (p.hits <= 0) p.isActive = false;
                    if (p.owner) p.owner.addMeter(0.06);
                }
                if (!p.isActive) projectiles.splice(i, 1);
            }

            // 【新仕様】空中追撃(ジャグル)に対応。相手が air_hit 状態のときも攻撃判定を有効化する
            if (player1.state === 'attack' && player1.currentAttack && !player1.hasHitThisAttack && !player1.currentAttack.isProjectile && player1.multihitCount === 0) {
                if (player1.stateTimer > player1.currentAttack.rec) {
                    if (player2.state !== 'knockdown' && player2.state !== 'guardstun') { 
                        if (checkCollision(player1.attackBox, player2)) {
                            player2.evaluateHit(player1.currentAttack, player1.currentAttack.hitType || 'high');
                            player1.hasHitThisAttack = true; player1.addMeter(0.06);
                        }
                    }
                }
            }
            if (player2.state === 'attack' && player2.currentAttack && !player2.hasHitThisAttack && !player2.currentAttack.isProjectile && player2.multihitCount === 0) {
                if (player2.stateTimer > player2.currentAttack.rec) {
                    if (player1.state !== 'knockdown' && player1.state !== 'guardstun') {
                        if (checkCollision(player2.attackBox, player1)) {
                            player1.evaluateHit(player2.currentAttack, 'high'); player2.hasHitThisAttack = true;
                        }
                    }
                }
            }

            player1.draw(); player2.draw();

            if (selectModeIndex === 0 && (player1.hp <= 0 || player2.hp <= 0)) { gameMode = 'GAME_OVER'; clearInterval(matchTimerInterval); }
        }

        function checkCommand(pattern) {
            const now = Date.now(); inputBuffer = inputBuffer.filter(i => now - i.time < 400); 
            const historyStr = inputBuffer.map(i => i.dir).join(''); let targetPattern = pattern;
            if (player1.facing === -1) {
                targetPattern = pattern.replace(/3/g, 'tmp').replace(/1/g, '3').replace(/tmp/g, '1')
                                       .replace(/6/g, 'tmp').replace(/4/g, '6').replace(/tmp/g, '4');
            }
            return historyStr.includes(targetPattern);
        }

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();

            if (gameMode === 'TITLE') {
                if (key === ' ') { gameMode = 'MODE_SELECT'; } return;
            }
            if (gameMode === 'MODE_SELECT') {
                if (key === 'w') { selectModeIndex = 0; }
                if (key === 'x') { selectModeIndex = 1; }
                if (key === ' ') { gameMode = 'CHAR_SELECT'; } return;
            }
            if (gameMode === 'CHAR_SELECT') {
                if (key === 'a') { selectIndex = (selectIndex - 1 + 3) % 3; }
                if (key === 'd') { selectIndex = (selectIndex + 1) % 3; }
                if (key === ' ') { startBattle(); } return;
            }
            if (gameMode === 'GAME_OVER') {
                if (key === ' ') { gameMode = 'TITLE'; document.getElementById('game-ui').style.display = 'none'; document.getElementById('training-panel').style.display = 'none'; } return;
            }

            if (gameMode === 'BATTLE' && selectModeIndex === 1 && key === 't') {
                dummyStateSetting = (dummyStateSetting + 1) % 4;
                document.getElementById('dummy-state-text').innerText = DUMMY_STRINGS[dummyStateSetting];
                return;
            }

            if (['q','w','e','a','d','z','x','c'].includes(key)) {
                if (!moveKeyStack.includes(key)) moveKeyStack.push(key); activeMoveKey = key;
                const currentDir = getJoystickDirection();
                if (inputBuffer.length === 0 || inputBuffer[inputBuffer.length-1].dir !== currentDir) {
                    inputBuffer.push({ dir: currentDir, time: Date.now() });
                }
            }

            if (['j','k','l','u','i','o',' '].includes(key)) {
                const currentDir = getJoystickDirection();
                let strength = ['j','u'].includes(key) ? 0 : (['k','i'].includes(key) ? 1 : 2);
                if (key === ' ') strength = 3; 

                if ((key === 'l' || key === 'o') && (currentDir === 4 || currentDir === 6)) {
                    if (player1.tryThrow()) { inputBuffer = []; return; }
                }

                if ((checkCommand('236') || checkCommand('26')) && (['j','k','l',' '].includes(key))) {
                    if (strength === 3) {
                        if (player1.meter >= 1.0) { player1.meter -= 1.0; player1.startSpecialAttack('hadouken', 3); }
                    } else { player1.startSpecialAttack('hadouken', strength); }
                    inputBuffer = []; return;
                }
                
                if (checkCommand('623') && (['j','k','l',' '].includes(key))) {
                    if (strength === 3) {
                        if (player1.meter >= 1.0) { player1.meter -= 1.0; player1.startSpecialAttack('shoryuken', 3); }
                    } else { player1.startSpecialAttack('shoryuken', strength); }
                    inputBuffer = []; return;
                }
                
                if ((checkCommand('214') || checkCommand('24')) && (['u','i','o',' '].includes(key))) {
                    if (strength === 3) {
                        if (player1.meter >= 1.0) { player1.meter -= 1.0; player1.startSpecialAttack('tatsumaki', 3); }
                    } else { player1.startSpecialAttack('tatsumaki', strength); }
                    inputBuffer = []; return;
                }

                if (key !== ' ') player1.startNormalAttack(key, currentDir);
            }
        });

        window.addEventListener('keyup', (event) => {
            const key = event.key.toLowerCase();
            if (['q','w','e','a','d','z','x','c'].includes(key)) {
                const index = moveKeyStack.indexOf(key); if (index > -1) moveKeyStack.splice(index, 1);
                activeMoveKey = moveKeyStack.length > 0 ? moveKeyStack[moveKeyStack.length - 1] : null;
            }
        });

        animate();
    </script>
</body>
