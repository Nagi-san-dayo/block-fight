<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Auto-Guard Fighter II - QWEADZXC 8-Way</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        canvas {
            border: 4px solid #666;
            background-color: #111;
            box-shadow: 0px 0px 25px rgba(0,0,0,0.9);
        }
        .ui-container {
            width: 800px;
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-bottom: 10px;
        }
        .hp-bar-container {
            width: 340px;
            height: 24px;
            background-color: #555;
            border: 2px solid #fff;
        }
        .hp-bar {
            height: 100%;
            background-color: #ffcc00;
            width: 100%;
            transition: width 0.1s ease-out;
        }
        .combo-counter {
            position: absolute;
            top: 40px;
            font-size: 24px;
            font-weight: bold;
            color: #ff3333;
            text-shadow: 2px 2px #000;
            opacity: 0;
        }
        #p1-combo { left: 10px; }
        #p2-combo { right: 10px; }
        .controls {
            margin-top: 10px;
            font-size: 13px;
            color: #ccc;
            text-align: center;
            line-height: 1.5;
            background: #333;
            padding: 10px;
            border-radius: 8px;
        }
        .status-text {
            font-size: 14px;
            font-weight: bold;
            color: #00ffff;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="ui-container">
        <div>
            <div style="font-weight: bold;">PLAYER 1 (YOU)</div>
            <div class="hp-bar-container"><div id="p1-hp" class="hp-bar"></div></div>
            <div id="p1-status" class="status-text"></div>
        </div>
        <div style="font-size: 24px; font-weight: bold; color: #ff3333;">VS</div>
        <div style="text-align: right;">
            <div style="font-weight: bold;">CPU</div>
            <div class="hp-bar-container"><div id="p2-hp" class="hp-bar"></div></div>
            <div id="p2-status" class="status-text"></div>
        </div>
        
        <div id="p1-combo" class="combo-counter">0 HIT!</div>
        <div id="p2-combo" class="combo-counter">0 HIT!</div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>
    
    <div class="controls">
        <strong>【8方向移動】</strong> Q(左上) W(上) E(右上) / A(左) D(右) / Z(左下) X(下) C(右下)<br>
        <strong>【オートガード】</strong> 移動中に敵の攻撃が当たると自動発動！ ➔ <strong>A:</strong>立ちガード / <strong>Z:</strong>しゃがみガード / <strong>X:</strong>ジャストパリィ<br>
        <strong>【攻撃（レバー方向で変化）】</strong> パンチ: J(弱) / K(中) / L(強) ｜ キック: U(弱) / I(中) / O(強)<br>
        <strong>【特殊技】</strong> X(またはZ,C)＋O (足払い:下段) ｜ D＋L (正拳突き:中段) ｜ 波動拳: X ➔ C ➔ D ＋ パンチ
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const GRAVITY = 0.6;
        const FLOOR_Y = canvas.height - 40;

        // 技データの定義（hitType: high=上段, low=下段, overhead=中段）
        const ATTACK_DATA = {
            lp: { name: '立弱P', damage: 3,  width: 60,  height: 20, offsetX: 50,  offsetY: 30, active: 5,  rec: 5,  stun: 12, hitType: 'high' },
            mp: { name: '立中P', damage: 7,  width: 80,  height: 25, offsetX: 50,  offsetY: 25, active: 7,  rec: 10, stun: 18, hitType: 'high' },
            hp: { name: '立強P', damage: 12, width: 100, height: 30, offsetX: 50,  offsetY: 20, active: 9,  rec: 15, stun: 25, hitType: 'high' },
            lk: { name: '立弱K', damage: 4,  width: 70,  height: 20, offsetX: 50,  offsetY: 80, active: 5,  rec: 6,  stun: 13, hitType: 'high' },
            mk: { name: '立中K', damage: 8,  width: 85,  height: 25, offsetX: 50,  offsetY: 75, active: 8,  rec: 12, stun: 19, hitType: 'high' },
            hk: { name: '立強K', damage: 14, width: 110, height: 35, offsetX: 50,  offsetY: 70, active: 11, rec: 20, stun: 28, hitType: 'high' },

            cr_lp: { name: '屈弱P', damage: 3,  width: 55,  height: 20, offsetX: 50,  offsetY: 40, active: 4,  rec: 5,  stun: 10, hitType: 'high' },
            cr_mp: { name: '屈中P', damage: 6,  width: 75,  height: 25, offsetX: 50,  offsetY: 45, active: 7,  rec: 9,  stun: 16, hitType: 'high' },
            cr_hp: { name: '屈強P', damage: 11, width: 90,  height: 30, offsetX: 50,  offsetY: 35, active: 9,  rec: 16, stun: 24, hitType: 'high' },
            cr_lk: { name: '屈弱K', damage: 3,  width: 65,  height: 18, offsetX: 50,  offsetY: 65, active: 5,  rec: 5,  stun: 11, hitType: 'low' },
            cr_mk: { name: '屈中K', damage: 7,  width: 85,  height: 22, offsetX: 50,  offsetY: 65, active: 8,  rec: 11, stun: 17, hitType: 'low' },
            cr_hk: { name: '足払い', damage: 15, width: 120, height: 25, offsetX: 50,  offsetY: 65, active: 12, rec: 24, stun: 35, hitType: 'low' },

            f_hp:  { name: '鎖骨割り', damage: 14, width: 85,  height: 40, offsetX: 50,  offsetY: 5,  active: 12, rec: 18, stun: 26, hitType: 'overhead' },
            f_hk:  { name: '前蹴り',  damage: 13, width: 115, height: 30, offsetX: 50,  offsetY: 50, active: 10, rec: 16, stun: 24, hitType: 'high' }
        };

        class Fireball {
            constructor(x, y, direction, owner) {
                this.x = x; this.y = y; this.width = 45; this.height = 30;
                this.speed = 6.5 * direction; this.owner = owner;
                this.damage = 10; this.hitStun = 22; this.hitType = 'high'; this.isActive = true;
            }
            update() { this.x += this.speed; if (this.x < 0 || this.x > canvas.width) this.isActive = false; }
            draw() { ctx.fillStyle = '#00f3ff'; ctx.fillRect(this.x, this.y, this.width, this.height); }
        }

        class Fighter {
            constructor({ x, y, color, isCPU }) {
                this.x = x; this.y = y; this.baseHeight = 130; this.height = this.baseHeight; this.width = 60;
                this.vx = 0; this.vy = 0; this.color = color; this.isCPU = isCPU; this.hp = 100;
                this.facing = 1; this.isGrounded = false;

                this.state = 'idle'; 
                this.stateTimer = 0;
                this.currentAttack = null;
                this.hasHitThisAttack = false;

                this.comboCount = 0; this.comboTimer = 0;
                this.attackBox = { x: 0, y: 0, width: 0, height: 0 };
                this.isCrouching = false;

                // CPU用のダミーガード状態
                this.cpuGuardType = null;
            }

            draw() {
                if (this.state === 'hitstun') ctx.fillStyle = '#ff4444';
                else if (this.state === 'guardstun') ctx.fillStyle = '#44ff44';
                else if (this.state === 'attack') ctx.fillStyle = '#ffaa00';
                else {
                    // P1側で特定のガードキー（A,Z,X）がアクティブな場合、構えの色を変える
                    if (!this.isCPU && activeMoveKey === 'x') ctx.fillStyle = '#ffffff'; // パリィ構え
                    else if (!this.isCPU && (activeMoveKey === 'a' || activeMoveKey === 'z')) ctx.fillStyle = '#00ffff'; // ガード構え
                    else ctx.fillStyle = this.color;
                }

                ctx.fillRect(this.x, this.y, this.width, this.height);

                ctx.fillStyle = '#000';
                let eyeX = this.facing === 1 ? this.x + this.width - 15 : this.x + 5;
                ctx.fillRect(eyeX, this.y + 15, 10, 10);

                if (this.state === 'attack' && this.currentAttack && this.stateTimer > this.currentAttack.rec) {
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
                    ctx.fillRect(this.attackBox.x, this.attackBox.y, this.attackBox.width, this.attackBox.height);
                }
            }

            update(currentDirNum) {
                // しゃがみ判定 (1, 2, 3 のとき背を低くする)
                if (this.state !== 'attack' && this.state !== 'hitstun' && [1, 2, 3].includes(currentDirNum)) {
                    this.isCrouching = true; this.height = this.baseHeight * 0.7;
                } else if (this.state !== 'attack' && this.state !== 'hitstun') {
                    this.isCrouching = false; this.height = this.baseHeight;
                }

                this.y += this.vy;
                if (this.y + this.height >= FLOOR_Y) {
                    this.y = FLOOR_Y - this.height; this.vy = 0; this.isGrounded = true;
                } else { this.vy += GRAVITY; this.isGrounded = false; }

                this.x += this.vx;
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;

                if (this.stateTimer > 0) {
                    this.stateTimer--;
                    if (this.stateTimer === 0) { this.state = 'idle'; this.currentAttack = null; }
                }

                if (this.state === 'attack' && this.currentAttack) {
                    const data = this.currentAttack;
                    this.attackBox.width = data.width; this.attackBox.height = data.height;
                    this.attackBox.y = this.y + data.offsetY;
                    this.attackBox.x = this.facing === 1 ? this.x + data.offsetX : this.x - data.width;
                }

                if (this.comboTimer > 0) {
                    this.comboTimer--;
                    if (this.comboTimer === 0) {
                        this.comboCount = 0;
                        document.getElementById(this.isCPU ? 'p2-combo' : 'p1-combo').style.opacity = 0;
                    }
                }
            }

            startAttack(button, dirNum) {
                if (this.state === 'hitstun' || this.state === 'guardstun') return;
                if (this.state === 'attack' && !this.hasHitThisAttack) return;

                let relDir = 'N'; 
                if ([1, 2, 3].includes(dirNum)) relDir = 'D'; 
                if ((this.facing === 1 && [3, 6, 9].includes(dirNum)) || (this.facing === -1 && [1, 4, 7].includes(dirNum))) {
                    relDir = 'F'; 
                }

                let attackKey = button;
                if (relDir === 'D') attackKey = 'cr_' + button;
                if (relDir === 'F' && ATTACK_DATA['f_' + button]) attackKey = 'f_' + button;

                const data = ATTACK_DATA[attackKey] || ATTACK_DATA[button];
                this.state = 'attack';
                this.currentAttack = data;
                this.hasHitThisAttack = false;
                this.stateTimer = data.active + data.rec;

                document.getElementById(this.isCPU ? 'p2-status' : 'p1-status').innerText = data.name;
            }

            startHadouken() {
                if (this.state === 'hitstun' || this.state === 'guardstun') return;
                if (this.state === 'attack' && !this.hasHitThisAttack) return;
                this.state = 'attack';
                this.currentAttack = { rec: 12, active: 0, name: '波動拳' };
                this.stateTimer = 22;
                this.hasHitThisAttack = true;
                let spawnX = this.facing === 1 ? this.x + this.width + 5 : this.x - 50;
                projectiles.push(new Fireball(spawnX, this.y + 30, this.facing, this));
                document.getElementById(this.isCPU ? 'p2-status' : 'p1-status').innerText = '波動拳';
            }

            // ★ オートガード機能が組み込まれた被撃判定
            evaluateHit(damage, hitStun, hitType) {
                let isGuarded = false;
                let isParried = false;

                if (this.isCPU) {
                    // CPU側のガード判定
                    if (this.cpuGuardType === 'x') isParried = true;
                    else if (this.cpuGuardType === 'a' && hitType !== 'low') isGuarded = true;
                    else if (this.cpuGuardType === 'z' && hitType !== 'overhead') isGuarded = true;
                } else {
                    // ➔ プレイヤー側のオートガード判定（現在アクティブな移動キーに応じて自動変化）
                    if (activeMoveKey === 'x') {
                        isParried = true; // Xキー(下)を押していれば自動ジャストパリィ！
                    } else if (activeMoveKey === 'a' && hitType !== 'low') {
                        isGuarded = true; // Aキー(左)を押していれば自動立ちガード！
                    } else if (activeMoveKey === 'z' && hitType !== 'overhead') {
                        isGuarded = true; // Zキー(左下)を押していれば自動しゃがみガード！
                    }
                }

                const statusId = this.isCPU ? 'p2-status' : 'p1-status';

                if (isParried) {
                    document.getElementById(statusId).innerText = 'JUST PARRIED!';
                    this.x -= this.facing * 5; 
                    return; // パリィはノーダメージ＆硬直なし
                }

                if (isGuarded) {
                    document.getElementById(statusId).innerText = 'GUARD!';
                    this.state = 'guardstun';
                    this.stateTimer = Math.floor(hitStun * 0.5); 
                    this.x -= this.facing * 8;
                    return;
                }

                // ガードを崩された、またはキーを入力していなかった場合（ヒット）
                document.getElementById(statusId).innerText = 'HIT!';
                this.hp -= damage;
                if (this.hp < 0) this.hp = 0;
                document.getElementById(this.isCPU ? 'p2-hp' : 'p1-hp').style.width = this.hp + '%';

                this.comboCount++;
                this.comboTimer = hitStun + 15;
                const comboId = this.isCPU ? 'p2-combo' : 'p1-combo';
                const comboEl = document.getElementById(comboId);
                if (this.comboCount > 1) { comboEl.innerText = `${this.comboCount} HIT!`; comboEl.style.opacity = 1; }

                this.state = 'hitstun';
                this.stateTimer = hitStun;
                this.currentAttack = null;
                this.x -= this.facing * 14;
            }
        }

        const player1 = new Fighter({ x: 150, y: 0, color: '#3366ff', isCPU: false });
        const player2 = new Fighter({ x: 550, y: 0, color: '#ff3333', isCPU: true });
        let projectiles = [];

        // ==========================================
        // QWEADZXC 8方向レバー 入力スタックシステム
        // ==========================================
        let activeMoveKey = null;   // 現在一番最後に押されている（有効な）移動キー
        const moveKeyStack = [];     // 押されたキーの歴史を保存するスタック

        function getJoystickDirection() {
            switch (activeMoveKey) {
                case 'z': return 1; // 左下
                case 'x': return 2; // 下
                case 'c': return 3; // 右下
                case 'a': return 4; // 左
                case 'd': return 6; // 右
                case 'q': return 7; // 左上
                case 'w': return 8; // 上
                case 'e': return 9; // 右上
                default:  return 5; // ニュートラル
            }
        }

        let inputBuffer = [];
        function checkCollision(rect1, rect2) {
            return (rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x &&
                    rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y);
        }

        // CPUのAI
        let cpuTimer = 0;
        function updateCPU() {
            if (player2.state === 'hitstun' || player2.state === 'guardstun') return;
            player2.facing = player1.x > player2.x ? 1 : -1;
            const dist = Math.abs(player1.x - player2.x);

            player2.cpuGuardType = null;

            if (player2.state === 'idle') {
                if (player1.state === 'attack' && player1.currentAttack && dist < 180) {
                    const r = Math.random();
                    if (r < 0.1) player2.cpuGuardType = 'x'; 
                    else if (player1.currentAttack.hitType === 'low') player2.cpuGuardType = 'z'; 
                    else player2.cpuGuardType = 'a'; 
                    player2.vx = 0; return;
                }

                if (dist > 120) player2.vx = player2.facing * 2.2;
                else if (dist < 60) player2.vx = -player2.facing * 2;
                else player2.vx = 0;

                cpuTimer--;
                if (cpuTimer <= 0) {
                    cpuTimer = 40 + Math.random() * 40;
                    if (dist < 150) {
                        const b = ['lp','mp','hp','lk','mk','hk'][Math.floor(Math.random()*6)];
                        const d = [5, 2, 6][Math.floor(Math.random()*3)];
                        player2.startAttack(b, d);
                    } else if (Math.random() < 0.2) {
                        player2.startHadouken();
                    }
                }
            } else { player2.vx = 0; }
        }

        // メインループ
        function animate() {
            window.requestAnimationFrame(animate);
            ctx.fillStyle = '#222'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#444'; ctx.fillRect(0, FLOOR_Y, canvas.width, canvas.height - FLOOR_Y);

            const p1Dir = getJoystickDirection();

            // P1の移動処理
            if (player1.state !== 'attack' && player1.state !== 'hitstun' && player1.state !== 'guardstun') {
                player1.facing = player1.x < player2.x ? 1 : -1;
                
                // ジャンプ（Q, W, E要素）
                if ([7, 8, 9].includes(p1Dir) && player1.isGrounded) player1.vy = -13;
                
                // 左右移動（Q, A, Z要素は左 / E, D, C要素は右）
                if ([1, 4, 7].includes(p1Dir)) player1.vx = -4.5;
                else if ([3, 6, 9].includes(p1Dir)) player1.vx = 4.5;
                else player1.vx = 0;
            } else { player1.vx = 0; }

            player1.update(p1Dir); updateCPU(); player2.update(5);

            // 飛び道具判定
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i]; p.update(); p.draw();
                let target = p.owner === player1 ? player2 : player1;
                if (checkCollision(p, target) && p.isActive) {
                    target.evaluateHit(p.damage, p.hitStun, p.hitType); p.isActive = false;
                }
                if (!p.isActive) projectiles.splice(i, 1);
            }

            // 攻撃判定
            if (player1.state === 'attack' && player1.currentAttack && !player1.hasHitThisAttack) {
                if (player1.stateTimer > player1.currentAttack.rec) {
                    if (checkCollision(player1.attackBox, player2)) {
                        player2.evaluateHit(player1.currentAttack.damage, player1.currentAttack.stun, player1.currentAttack.hitType);
                        player1.hasHitThisAttack = true;
                    }
                }
            }
            if (player2.state === 'attack' && player2.currentAttack && !player2.hasHitThisAttack) {
                if (player2.stateTimer > player2.currentAttack.rec) {
                    if (checkCollision(player2.attackBox, player1)) {
                        player1.evaluateHit(player2.currentAttack.damage, player2.currentAttack.stun, player2.currentAttack.hitType);
                        player2.hasHitThisAttack = true;
                    }
                }
            }

            player1.draw(); player2.draw();
        }

        // コマンド判定 (テンキー履歴)
        function checkHadoukenCommand() {
            const now = Date.now();
            inputBuffer = inputBuffer.filter(i => now - i.time < 350);
            const historyStr = inputBuffer.map(i => i.dir).join('');
            if (player1.facing === 1 && (historyStr.includes('236') || historyStr.includes('26'))) { inputBuffer = []; return true; }
            if (player1.facing === -1 && (historyStr.includes('214') || historyStr.includes('24'))) { inputBuffer = []; return true; }
            return false;
        }

        // キーボードイベント
        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            
            // ➔ QWEADZXC のいずれかが押された場合のスタック処理
            if (['q','w','e','a','d','z','x','c'].includes(key)) {
                if (!moveKeyStack.includes(key)) {
                    moveKeyStack.push(key);
                }
                activeMoveKey = key; // 最後に押されたキーを一番有効にする

                const currentDir = getJoystickDirection();
                if (inputBuffer.length === 0 || inputBuffer[inputBuffer.length-1].dir !== currentDir) {
                    inputBuffer.push({ dir: currentDir, time: Date.now() });
                }
            }

            // 攻撃アクション
            if (['j', 'k', 'l', 'u', 'i', 'o'].includes(key)) {
                const currentDir = getJoystickDirection();
                if (['j', 'k', 'l'].includes(key) && checkHadoukenCommand()) {
                    player1.startHadouken();
                } else {
                    let btn = '';
                    if (key === 'j') btn = 'lp'; if (key === 'k') btn = 'mp'; if (key === 'l') btn = 'hp';
                    if (key === 'u') btn = 'lk'; if (key === 'i') btn = 'mk'; if (key === 'o') btn = 'hk';
                    player1.startAttack(btn, currentDir);
                }
            }
        });

        window.addEventListener('keyup', (event) => {
            const key = event.key.toLowerCase();
            
            // ➔ キーが離されたらスタックから削除し、残っている中で最後に押されたキーに切り替える
            if (['q','w','e','a','d','z','x','c'].includes(key)) {
                const index = moveKeyStack.indexOf(key);
                if (index > -1) {
                    moveKeyStack.splice(index, 1);
                }
                activeMoveKey = moveKeyStack.length > 0 ? moveKeyStack[moveKeyStack.length - 1] : null;
            }
        });

        animate();
    </script>
</body>
</html>
