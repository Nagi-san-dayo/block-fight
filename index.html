<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Super Fighting Fighter - Drive Edition</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #111; color: white; font-family: 'Impact', 'Arial Black', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden; user-select: none;
        }
        .game-wrapper {
            position: relative; width: 1280px; height: 720px;
            box-shadow: 0px 0px 40px rgba(0,0,0,0.8); border: 4px solid #444; background-color: #1a1a1a;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        /* UIレイアウト */
        .ui-container {
            position: absolute; top: 20px; left: 5%; width: 90%;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 10;
        }
        .bar-wrapper { width: 42%; }
        .hp-bar-container { height: 28px; background-color: #442222; border: 3px solid #fff; margin-bottom: 4px; }
        .hp-bar { height: 100%; background: linear-gradient(to right, #ffcc00, #ff3300); width: 100%; transition: width 0.1s ease-out; }
        
        /* ドライブゲージ */
        .drive-bar-container { height: 14px; background-color: #222; border: 2px solid #fff; margin-bottom: 4px; position: relative; }
        .drive-bar { height: 100%; background: linear-gradient(to right, #00ffcc, #33ff33); width: 100%; transition: width 0.05s ease-out; }
        .burnout { background: linear-gradient(to right, #ff3300, #aa1100) !important; animation: blink 0.4s infinite alternate; }
        @keyframes blink { from { opacity: 0.5; } to { opacity: 1; } }

        .meter-bar-container { height: 16px; background-color: #222244; border: 2px solid #fff; }
        .meter-bar { height: 100%; background: linear-gradient(to right, #0066ff, #00ffff); width: 0%; }
        
        .char-info { font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px #000; margin-bottom: 2px; }
        .p2-info { text-align: right; }
        .p2-hp { float: right; }

        .center-ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; z-index: 10; pointer-events: none;
        }
        .timer { font-size: 54px; font-weight: bold; color: #fff; text-shadow: 3px 3px 0px #000; background: rgba(0,0,0,0.5); padding: 0 20px; border-radius: 10px; }
        
        /* コンボ通知等 */
        .combo-alert { font-size: 32px; color: #ff3300; font-style: italic; text-shadow: 2px 2px 0px #000; font-weight: bold; margin-top: 10px; opacity: 0; transition: opacity 0.2s; }
        .status-alert { font-size: 20px; color: #00ffff; font-weight: bold; text-shadow: 1px 1px 2px #000; margin-top: 4px; }
        
        /* メニュー・モーダル */
        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .hidden { display: none !important; }
        h1 { font-size: 64px; color: #fff; margin-bottom: 4px; text-shadow: 4px 4px 0px #ff3300; }
        .subtitle { font-size: 20px; color: #aaa; margin-bottom: 4px; }
        .menu-btn {
            background: linear-gradient(#444, #222); color: white; border: 2px solid #888;
            padding: 14px 40px; font-size: 22px; cursor: pointer; margin: 10px; width: 320px; text-align: center;
            border-radius: 5px; font-weight: bold; transition: 0.2s;
        }
        .menu-btn:hover { background: linear-gradient(#ff3300, #aa1100); border-color: #fff; transform: scale(1.05); }
        
        /* セレクト画面 */
        .select-container { display: flex; gap: 30px; margin-bottom: 30px; }
        .char-card {
            border: 3px solid #555; background: #222; padding: 20px; width: 180px; text-align: center;
            cursor: pointer; border-radius: 8px; transition: 0.2s;
        }
        .char-card:hover { border-color: #00ffff; background: #333; }
        .char-card.selected { border-color: #ff3300; background: #442222; transform: scale(1.05); }
        .char-name { font-size: 24px; font-weight: bold; margin-top: 10px; }

        /* トレーニング設定パネル */
        .training-panel {
            position: absolute; left: 20px; top: 140px; background: rgba(0,0,0,0.75);
            border: 2px solid #666; padding: 15px; border-radius: 8px; z-index: 50; width: 260px; pointer-events: auto;
        }
        .panel-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #aaa; padding-bottom: 4px; color: #ff3300; }
        .panel-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; }
        .panel-btn { background: #444; color: #fff; border: 1px solid #777; padding: 4px 10px; cursor: pointer; font-size: 12px; border-radius: 3px; min-width: 130px; text-align: center; }
        .panel-btn:hover { background: #666; }

        /* 超必殺カットイン */
        .cutin-layer {
            position: absolute; inset: 0; pointer-events: none; z-index: 80; display: flex; align-items: center;
            overflow: hidden; opacity: 0; transition: opacity 0.15s;
        }
        .cutin-bg { width: 100%; height: 180px; background: linear-gradient(90deg, rgba(255,51,0,0.9) 0%, rgba(0,0,0,0.9) 50%, rgba(255,51,0,0.9) 100%); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px #ff3300; transform: skewX(-15deg) translateX(-100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .cutin-text { font-size: 54px; color: #fff; font-weight: bold; text-transform: uppercase; letter-spacing: 4px; text-shadow: 4px 4px 0px #000; transform: skewX(15deg); }
        .cutin-layer.active { opacity: 1; }
        .cutin-layer.active .cutin-bg { transform: skewX(-15deg) translateX(0); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="ui-container">
            <div class="bar-wrapper">
                <div id="p1-name" class="char-info">PLAYER 1</div>
                <div class="hp-bar-container"><div id="p1-hp" class="hp-bar"></div></div>
                <div class="drive-bar-container"><div id="p1-drive" class="drive-bar"></div></div>
                <div class="meter-bar-container"><div id="p1-meter" class="meter-bar"></div></div>
            </div>
            <div class="bar-wrapper p2-info">
                <div id="p2-name" class="char-info">PLAYER 2</div>
                <div class="hp-bar-container"><div id="p2-hp" class="hp-bar" style="float:right;"></div></div>
                <div class="drive-bar-container"><div id="p2-drive" class="drive-bar" style="float:right;"></div></div>
                <div class="meter-bar-container"><div id="p2-meter" class="meter-bar" style="float:right;"></div></div>
            </div>
        </div>

        <div class="center-ui">
            <div id="game-timer" class="timer">99</div>
            <div id="p1-combo" class="combo-alert">0 COMBO<br><span style="font-size:16px;">0 DMG</span></div>
            <div id="p1-status" class="status-alert"></div>
            <div id="p2-combo" class="combo-alert" style="text-align: right;">0 COMBO<br><span style="font-size:16px;">0 DMG</span></div>
            <div id="p2-status" class="status-alert" style="text-align: right;"></div>
        </div>

        <div id="training-menu" class="training-panel hidden">
            <div class="panel-title">TRAINING SETTING</div>
            <div class="panel-row">
                <span>ダミー状態:</span>
                <button id="btn-dummy-state" class="panel-btn">立ち (IDLE)</button>
            </div>
            <div class="panel-row">
                <span>P2受身方向:</span>
                <button id="btn-dummy-tech" class="panel-btn">その場受身</button>
            </div>
            <div class="panel-row">
                <span>ゲージ自動回復:</span>
                <button id="btn-refill" class="panel-btn">ON</button>
            </div>
            <div class="panel-row" style="margin-top:10px; font-size:11px; color:#aaa; justify-content:center;">
                <span>[ESC] キーでメニューへ戻る</span>
            </div>
        </div>

        <div id="cutin-screen" class="cutin-layer">
            <div class="cutin-bg">
                <div id="cutin-txt" class="cutin-text">SUPER MOVE!</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="1280" height="720"></canvas>

        <div id="title-screen" class="overlay">
            <h1>SUPER FIGHTING FIGHTER</h1>
            <div class="subtitle">- DRIVE BLOW EDITION -</div>
            <button class="menu-btn" onclick="showCharacterSelect('local')">LOCAL VERSUS</button>
            <button class="menu-btn" onclick="showCharacterSelect('training')">TRAINING MODE</button>
            <button class="menu-btn" onclick="showCharacterSelect('online')">ONLINE MATCH (MOCK)</button>
        </div>

        <div id="select-screen" class="overlay hidden">
            <h2 style="font-size:36px; margin-bottom:20px;">CHOOSE YOUR FIGHTER</h2>
            <div class="select-container">
                <div class="char-card selected" id="card-ryu" onclick="selectChar(0)">
                    <div style="font-size:50px;">🥋</div>
                    <div class="char-name">RYU</div>
                    <div style="font-size:12px; color:#aaa; margin-top:5px;">スタンダード・波動昇竜</div>
                </div>
                <div class="char-card" id="card-ken" onclick="selectChar(1)">
                    <div style="font-size:50px;">🔥</div>
                    <div class="char-name">KEN</div>
                    <div style="font-size:12px; color:#aaa; margin-top:5px;">ラッシュ・インファイト重視</div>
                </div>
            </div>
            <button class="menu-btn" onclick="confirmCharacter()">BATTLE START</button>
            <button class="menu-btn" style="background:#333; font-size:16px; padding:6px 20px; width:150px;" onclick="backToTitle()">BACK</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js" onerror="console.log('Online mode socket unavailable')"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ゲームモード・状態管理
        let gameMode = 'local'; // 'local', 'training', 'online'
        let isOnlineMode = false;
        let socket = null;
        let myPlayerType = 'p1'; 

        // トレーニング用設定設定
        // 0:立ち, 1:しゃがみ, 2:常時ガード, 3:ジャストパリィ, 4:初撃以降自動ガード
        let dummyStateSetting = 0; 
        const DUMMY_STRINGS = ['立ち (IDLE)', 'しゃがみ (CROUCH)', '常時ガード (GUARD)', 'ジャストパリィ (PARRY)', '初撃以降ガード (COMBO_GUARD)'];
        let dummyTechSetting = 0; // 0:その場, 1:後ろ受身
        const TECH_STRINGS = ['その場受身', '後ろ受身'];
        let isRefillOn = true;

        // キャラクター固有データ定義
        const CHAR_DATA = [
            { name: "RYU", color: "#eeeeee", secColor: "#cc0000" },
            { name: "KEN", color: "#cc0000", secColor: "#ffcc00" }
        ];
        let p1SelectedIdx = 0;
        let p2SelectedIdx = 1;

        // タイマー
        let battleTimer = 99;
        let timerInterval = null;
        let gameActive = false;

        // キー入力状態
        const keys = {};
        // 現在のテンキー方向表記(向きに依存せず、絶対的なレバー入力方向を1~9で保持)
        let p1CurrentDirNum = 5;
        let p2CurrentDirNum = 5;

        // --- コマンド履歴バッファ緩和設定 ---
        const COMMAND_BUFFER_LIFETIME = 700; // 500ms から 700ms へ緩和
        const INPUT_BUFFER_LIFETIME = 280;   // 150ms から 280ms へ緩和（先行入力）

        // クラス定義
        class Fighter {
            constructor({ x, y, color, isCPU, name, secColor }) {
                this.x = x; this.y = y;
                this.baseHeight = 220; this.height = this.baseHeight; this.width = 100;
                this.vx = 0; this.vy = 0; this.color = color; this.secColor = secColor;
                this.isCPU = isCPU; this.name = name;
                this.hp = 100; this.meter = 0.0;
                
                // ドライブシステム初期化
                this.driveGauge = 100;
                this.isBurnout = false;
                this.burnoutTimer = 0;
                this.isDriveRushing = false;
                this.driveRushTimer = 0;

                this.facing = 1; // 1:右向き, -1:左向き
                this.isGrounded = false;
                this.state = 'idle'; // 'idle', 'walk', 'crouch', 'attack', 'hitstun', 'guardstun', 'air_hit', 'knockdown', 'tech'
                this.stateTimer = 0;
                this.hitstopTimer = 0;
                this.currentAttack = null;
                this.hasHitThisAttack = false;
                
                this.comboCount = 0; this.comboDamage = 0; this.comboTimer = 0;
                this.attackBox = { x: 0, y: 0, width: 0, height: 0 };
                this.isCrouching = false;
                this.invincible = false; this.invincibleTimer = 0;

                // 多段必殺技用
                this.multihitCount = 0; this.multihitTimer = 0;
                this.tatsuSpeed = 0;
                
                // コマンド・先行入力バッファ
                this.commandHistory = [];
                this.bufferedInput = null;
                this.shoryuCancelWindow = 0;
                this.weakChainCount = 0;

                this.lastDirInput = 5;
                this.lastDirTime = 0;
            }

            updateDriveGauge(amount) {
                if (this.isBurnout) return;
                this.driveGauge = Math.max(0, Math.min(100, this.driveGauge + amount));
                if (this.driveGauge <= 0) {
                    this.isBurnout = true;
                    this.burnoutTimer = 420; // 7秒間バーンアウト (60fps * 7)
                    this.isDriveRushing = false;
                }
                this.refreshDriveUI();
            }

            refreshDriveUI() {
                const id = (this === player1) ? 'p1' : 'p2';
                const el = document.getElementById(`${id}-drive`);
                if (el) {
                    el.style.width = this.driveGauge + '%';
                    if (this.isBurnout) el.classList.add('burnout');
                    else el.classList.remove('burnout');
                }
            }

            addCommand(dirNum) {
                const now = Date.now();
                // 直前と異なる入力、または一定時間経過なら履歴に追加
                if (this.commandHistory.length === 0 || this.commandHistory[this.commandHistory.length - 1].dir !== dirNum || now - this.commandHistory[this.commandHistory.length - 1].time > 60) {
                    this.commandHistory.push({ dir: dirNum, time: now });
                }
                
                // ドライブラッシュのステップ検知 (前・前)
                let forwardKey = (this.facing === 1) ? 6 : 4;
                if (dirNum === forwardKey && this.lastDirInput === 5 && (now - this.lastDirTime < 250)) {
                    // 直前が5で、その前が前方向キーならステップ成立
                    let secondLast = this.commandHistory[this.commandHistory.length - 3];
                    if (secondLast && secondLast.dir === forwardKey) {
                        this.tryDriveRush();
                    }
                }
                if (dirNum === 5 || dirNum === forwardKey) {
                    this.lastDirInput = dirNum;
                    this.lastDirTime = now;
                }
            }

            tryDriveRush() {
                if (this.isBurnout || !this.isGrounded) return;

                // 通常技キャンセルかどうかの判定
                let isCancel = (this.state === 'attack' && this.currentAttack && !this.currentAttack.isSpecial && this.hasHitThisAttack);
                let cost = isCancel ? 50 : 16.6; // CRは3ブロック(50%)、生DRは1ブロック(16.6%)

                if (this.driveGauge < cost) return;

                this.updateDriveGauge(-cost);
                this.isDriveRushing = true;
                this.driveRushTimer = 22; // ラッシュダッシュ持続時間
                this.state = 'idle';
                this.stateTimer = 0;
                this.currentAttack = null;
                this.vx = this.facing * 20; // 高速ダッシュ力
                
                const id = (this === player1) ? 'p1-status' : 'p2-status';
                document.getElementById(id).innerText = isCancel ? 'DRIVE CANCEL RUSH!' : 'DRIVE RUSH!';
            }

            checkSpecialCommand(moveName) {
                const now = Date.now();
                this.commandHistory = this.commandHistory.filter(h => now - h.time < COMMAND_BUFFER_LIFETIME);
                const dirs = this.commandHistory.map(h => h.dir);

                // 向きに応じて波動・昇竜のコマンドを反転してチェック
                if (this.facing === 1) {
                    if (moveName === 'hadoken') {
                        // 2, 3, 6
                        return this.hasSubsequence(dirs, [2, 3, 6]) || this.hasSubsequence(dirs, [2, 6]);
                    }
                    if (moveName === 'shoryuken') {
                        // 6, 2, 3 または 6, 2, 6
                        return this.hasSubsequence(dirs, [6, 2, 3]) || this.hasSubsequence(dirs, [6, 2, 6]);
                    }
                    if (moveName === 'tatsumaki') {
                        // 2, 1, 4
                        return this.hasSubsequence(dirs, [2, 1, 4]) || this.hasSubsequence(dirs, [2, 4]);
                    }
                } else {
                    if (moveName === 'hadoken') {
                        // 2, 1, 4
                        return this.hasSubsequence(dirs, [2, 1, 4]) || this.hasSubsequence(dirs, [2, 4]);
                    }
                    if (moveName === 'shoryuken') {
                        // 4, 2, 1 または 4, 2, 4
                        return this.hasSubsequence(dirs, [4, 2, 1]) || this.hasSubsequence(dirs, [4, 2, 4]);
                    }
                    if (moveName === 'tatsumaki') {
                        // 2, 3, 6
                        return this.hasSubsequence(dirs, [2, 3, 6]) || this.hasSubsequence(dirs, [2, 6]);
                    }
                }
                return false;
            }

            hasSubsequence(array, sub) {
                let idx = 0;
                for (let i = 0; i < array.length; i++) {
                    if (array[i] === sub[idx]) {
                        idx++;
                        if (idx === sub.length) return true;
                    }
                }
                return false;
            }

            // 先行入力保存
            bufferMove(btnType, dirNum) {
                this.bufferedInput = { btnType, dirNum, time: Date.now() };
            }

            startNormalAttack(btnType, dirNum) {
                if (this.state === 'hitstun' || this.state === 'guardstun' || this.state === 'knockdown' || this.state === 'air_hit' || this.state === 'tech') return;
                
                // 特殊入力：投げ(弱P+弱Kなどだが、今回は各個別ボタン)省略、単純化のため
                this.state = 'attack';
                this.hasHitThisAttack = false;
                
                let strengthNum = 0; // 0:弱, 1:中, 2:強
                if (btnType === 'LP' || btnType === 'LK') strengthNum = 0;
                if (btnType === 'MP' || btnType === 'MK') strengthNum = 1;
                if (btnType === 'HP' || btnType === 'HK') strengthNum = 2;

                let isLow = (dirNum === 1 || dirNum === 2 || dirNum === 3);
                
                let dmg = 4, startup = 5, active = 3, rec = 10, hStun = 12, gStun = 8;
                let bW = 80, bH = 50, bY = -120;
                let hitType = isLow ? 'low' : 'mid';

                // --- 有利フレームをギリギリまでタイトにする調整パラメータ ---
                // ヒット硬直差 = hStun - (active - 1 + rec)
                if (strengthNum === 0) { 
                    dmg = 3; startup = 4; active = 3; rec = 7;
                    hStun = 9;   // 9 - (2 + 7) = +-0F (目押し最速でも繋がらないか持続のみ)
                    gStun = 6;   // ガード時-3F
                    bW = 75; bH = 40; bY = isLow ? -50 : -130;
                } else if (strengthNum === 1) { 
                    dmg = 6; startup = 7; active = 3; rec = 10;
                    hStun = 13;  // 13 - (2 + 10) = +1F有利 (極限の目押し重視)
                    gStun = 9;   // ガード時-3F
                    bW = 95; bH = 50; bY = isLow ? -50 : -140;
                } else { 
                    dmg = 11; startup = 10; active = 4; rec = 14;
                    hStun = 18;  // 18 - (3 + 14) = +1F有利
                    gStun = 12;  // ガード時-5F
                    bW = 120; bH = 60; bY = isLow ? -50 : -155;
                    if (!isLow && (btnType === 'HP' || btnType === 'HK') && (dirNum === 6 || dirNum === 4)) {
                        hitType = 'overhead'; // 中段
                    }
                }

                // ドライブラッシュ中の通常技強化（有利フレームを少しだけ伸ばしてコンボ可能にするSF6仕様）
                if (this.isDriveRushing) {
                    hStun += 4;
                    gStun += 4;
                }

                this.currentAttack = {
                    name: btnType, isSpecial: false, isSuper: false,
                    startup, active, recovery: rec, total: startup + active + rec,
                    damage: dmg, hitStun: hStun, guardStun: gStun, hitType,
                    boxWidth: bW, boxHeight: bH, boxYOffset: bY,
                    knockdown: false
                };
                this.stateTimer = this.currentAttack.total;
                
                if (this.isDriveRushing) {
                    this.isDriveRushing = false; // 技を出したらダッシュ終了
                }
            }

            startSpecialAttack(moveName, strength) {
                this.state = 'attack';
                this.hasHitThisAttack = false;
                let dmg = 10, startup = 8, active = 4, rec = 15, hStun = 20, gStun = 10;
                let bW = 100, bH = 80, bY = -120;
                let knockdown = true;

                if (moveName === 'hadoken') {
                    dmg = 7; startup = 12; active = 30; rec = 18; knockdown = false;
                    bW = 60; bH = 60; bY = -130;
                    hStun = 44; gStun = 38; // 飛び道具用
                } else if (moveName === 'shoryuken') {
                    dmg = 14; startup = 5; active = 6; rec = 25; knockdown = true;
                    bW = 80; bH = 160; bY = -200;
                    this.vy = -18; this.isGrounded = false; // 上昇
                } else if (moveName === 'tatsumaki') {
                    dmg = 4; startup = 7; active = 20; rec = 12; knockdown = true;
                    bW = 110; bH = 70; bY = -90;
                    this.tatsuSpeed = this.facing * 7;
                } else if (moveName === 'shinku_hadoken') {
                    // 超必殺技
                    dmg = 28; startup = 6; active = 40; rec = 25; knockdown = true;
                    bW = 150; bH = 100; bY = -140;
                    this.meter = 0;
                    triggerCutIn(this.name + " SHINKU HADOKEN!!!");
                }

                this.currentAttack = {
                    name: moveName, isSpecial: true, isSuper: (moveName === 'shinku_hadoken'),
                    startup, active, recovery: rec, total: startup + active + rec,
                    damage: dmg, hitStun: hStun, guardStun: gStun, hitType: 'mid',
                    boxWidth: bW, boxHeight: bH, boxYOffset: bY, knockdown
                };
                this.stateTimer = this.currentAttack.total;
            }

            tryThrow() {
                if (this.state !== 'idle' && this.state !== 'walk') return;
                let opponent = (this === player1) ? player2 : player1;
                
                // 投げ判定距離
                let dist = Math.abs((this.x + this.width/2) - (opponent.x + opponent.width/2));
                if (dist < 130 && opponent.isGrounded && opponent.state !== 'knockdown' && opponent.state !== 'tech') {
                    this.state = 'attack';
                    this.stateTimer = 30;
                    this.currentAttack = { name: 'throw', isSpecial: true, total: 30, startup: 3, active: 2, recovery: 25 };
                    
                    // 投げ成立
                    opponent.getThrown(this.facing);
                    this.updateDriveGauge(5);
                }
            }

            getThrown(attackerFacing) {
                this.state = 'knockdown';
                this.stateTimer = 60;
                this.hp = Math.max(0, this.hp - 12);
                this.vx = attackerFacing * 8;
                this.vy = -8;
                this.isGrounded = false;
                
                this.comboCount++;
                this.comboDamage += 12;
                this.displayCombo();
            }

            evaluateHit(attack, hitType) {
                if (this.invincible || this.state === 'knockdown' || this.state === 'tech') return;

                let isGuarded = false;
                let attacker = (this === player1) ? player2 : player1;

                // 1. めくり対応：相手との位置関係から正しいガードレバー方向を動的に計算
                let isOpponentOnRight = (attacker.x + attacker.width / 2) > (this.x + this.width / 2);
                let correctStandGuardDir = isOpponentOnRight ? 4 : 6;
                let correctCrouchGuardDir = isOpponentOnRight ? 1 : 3;

                let currentInput = (this === player1) ? p1CurrentDirNum : p2CurrentDirNum;

                // 2. トレーニングモード時の特別ガードロジック（初撃以降自動ガード）
                let autoComboGuard = false;
                if (this.isCPU && !isOnlineMode && dummyStateSetting === 4) {
                    if (this.comboCount > 0 && (this.state === 'hitstun' || this.state === 'air_hit')) {
                        autoComboGuard = true;
                    }
                }

                // 3. ガード成否のチェック
                if (this.isCPU && !isOnlineMode) {
                    if (dummyStateSetting === 2 || autoComboGuard) {
                        isGuarded = true; // 常時 or 連続ガード
                    } else if (dummyStateSetting === 1 && hitType !== 'overhead') {
                        isGuarded = true; // しゃがみガード
                    }
                } else {
                    // プレイヤー操作時まためくり対応の方向キー判定
                    if (currentInput === correctStandGuardDir && hitType !== 'low') isGuarded = true;
                    if (currentInput === correctCrouchGuardDir && hitType !== 'overhead') isGuarded = true;
                }

                // バーンアウト・削り・ドライブ減少処理
                if (isGuarded) {
                    const statusId = (this === player1) ? 'p1-status' : 'p2-status';
                    
                    if (this.isBurnout) {
                        document.getElementById(statusId).innerText = 'DRIVE BREAK GUARD!';
                        // バーンアウト中は本来のダメージの20%を強制削り
                        this.hp = Math.max(0, this.hp - Math.floor(attack.damage * 0.2));
                    } else {
                        document.getElementById(statusId).innerText = 'GUARD!';
                        // 通常時はガードするとドライブゲージが減少
                        this.updateDriveGauge(-12);
                    }

                    this.state = 'guardstun';
                    this.stateTimer = attack.guardStun;
                    this.hitstopTimer = 3;
                    this.vx = attacker.facing * 4; // ノックバック
                    attacker.hasHitThisAttack = true;
                    return;
                }

                // --- ヒット成立 ---
                const statusId = (this === player1) ? 'p1-status' : 'p2-status';
                document.getElementById(statusId).innerText = attack.isSuper ? 'SUPER HIT!!' : 'HIT!';

                this.hp = Math.max(0, this.hp - attack.damage);
                attacker.updateDriveGauge(4); // 攻撃側ドライブ微回復
                
                // コンボ数加算
                this.comboCount++;
                this.comboDamage += attack.damage;
                this.comboTimer = 90; // コンボ猶予タイマー
                this.displayCombo();

                attacker.hasHitThisAttack = true;

                // 必殺技ゲージ増加
                attacker.meter = Math.min(1.0, attacker.meter + 0.06);

                if (attack.knockdown || !this.isGrounded) {
                    this.state = 'air_hit';
                    this.stateTimer = attack.hitStun + 10;
                    this.vy = -12;
                    this.vx = attacker.facing * 5;
                    this.isGrounded = false;
                } else {
                    this.state = 'hitstun';
                    this.stateTimer = attack.hitStun;
                    this.vx = attacker.facing * 4.5;
                }
                this.hitstopTimer = attack.isSuper ? 12 : 5;
            }

            displayCombo() {
                const id = (this === player1) ? 'p2-combo' : 'p1-combo'; // ダメージを受けている側の反対(攻撃側)に表示
                const el = document.getElementById(id);
                if (el) {
                    el.innerHTML = `${this.comboCount} COMBO<br><span style="font-size:16px;">${this.comboDamage} DMG</span>`;
                    el.style.opacity = 1;
                }
            }

            clearCombo() {
                this.comboCount = 0;
                this.comboDamage = 0;
                const id = (this === player1) ? 'p2-combo' : 'p1-combo';
                const el = document.getElementById(id);
                if (el) el.style.opacity = 0;
            }

            update(opponent) {
                // バーンアウト経過処理
                if (this.isBurnout) {
                    this.burnoutTimer--;
                    if (this.burnoutTimer <= 0) {
                        this.isBurnout = false;
                        this.driveGauge = 100;
                        this.refreshDriveUI();
                    }
                } else {
                    // 通常時のドライブ自動微回復
                    if (this.driveGauge < 100) this.updateDriveGauge(0.05);
                }

                // ヒットストップ
                if (this.hitstopTimer > 0) {
                    this.hitstopTimer--;
                    return;
                }

                // コンボタイマー減少
                if (this.comboTimer > 0) {
                    this.comboTimer--;
                    if (this.comboTimer === 0) {
                        this.clearCombo();
                    }
                }

                if (this.invincibleTimer > 0) {
                    this.invincibleTimer--;
                    if (this.invincibleTimer === 0) this.invincible = false;
                }

                // 向き自動修正 (ダウン中、ラッシュ中以外)
                if (this.state !== 'knockdown' && this.state !== 'tech' && !this.isDriveRushing) {
                    if (this.x + this.width/2 < opponent.x + opponent.width/2) {
                        this.facing = 1;
                    } else {
                        this.facing = -1;
                    }
                }

                // 空中挙動・重力
                if (!this.isGrounded) {
                    this.vy += 0.7; // 重力
                    this.x += this.vx;
                    this.y += this.vy;

                    // 地面着地
                    if (this.y >= 720 - this.height - 60) {
                        this.y = 720 - this.height - 60;
                        this.vy = 0;
                        this.vx = 0;
                        this.isGrounded = true;

                        if (this.state === 'air_hit' || this.state === 'knockdown') {
                            this.state = 'knockdown';
                            // 起き上がり・受身の選択
                            if (this.isCPU && !isOnlineMode) {
                                this.stateTimer = (dummyTechSetting === 1) ? 25 : 40; 
                                if (dummyTechSetting === 1) { // 後ろ受身
                                    this.state = 'tech';
                                    this.vx = -this.facing * 6;
                                }
                            } else {
                                this.stateTimer = 40; // 通常起き上がり
                            }
                        }
                    }
                } else {
                    // 地上摩擦減衰
                    if (this.state !== 'attack' && !this.isDriveRushing && this.state !== 'tech') {
                        this.vx *= 0.8;
                    }
                    this.x += this.vx;
                }

                // 画面外へのはみ出し制限
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > 1280) this.x = 1280 - this.width;

                // 状態タイマー進行
                if (this.stateTimer > 0) {
                    this.stateTimer--;
                    
                    // 突進技の移動
                    if (this.state === 'attack' && this.currentAttack) {
                        let elapsed = this.currentAttack.total - this.stateTimer;
                        if (this.currentAttack.name === 'tatsumaki' && elapsed > 7 && elapsed < 25) {
                            this.vx = this.tatsuSpeed;
                        }
                        if (this.currentAttack.name === 'shoryuken' && elapsed > 15) {
                            // 降下中は無防備
                        }
                    }

                    if (this.stateTimer === 0) {
                        if (this.state === 'knockdown' || this.state === 'tech') {
                            // 起き上がり完了時、完全無敵を少し付与
                            this.invincible = true;
                            this.invincibleTimer = 10;
                        }
                        this.state = 'idle';
                        this.currentAttack = null;
                    }
                }

                // ドライブラッシュの減衰挙動
                if (this.isDriveRushing) {
                    this.driveRushTimer--;
                    this.vx = this.facing * 14;
                    if (this.driveRushTimer <= 0) {
                        this.isDriveRushing = false;
                    }
                }

                // CPU簡易AI (トレーニングモード用)
                if (this.isCPU && !isOnlineMode) {
                    this.updateCPUBehavior(opponent);
                }

                // アイドル・歩き状態の見た目補正
                if (this.state === 'idle' || this.state === 'walk') {
                    if (Math.abs(this.vx) > 0.5) this.state = 'walk';
                    else this.state = 'idle';
                }
            }

            updateCPUBehavior(opponent) {
                if (this.state === 'idle' || this.state === 'walk') {
                    if (dummyStateSetting === 1) {
                        this.height = this.baseHeight * 0.7;
                        this.isCrouching = true;
                    } else {
                        this.height = this.baseHeight;
                        this.isCrouching = false;
                    }
                }
            }

            draw() {
                ctx.save();
                
                // ドライブ判定用のオーラエフェクト
                if (this.isDriveRushing) {
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = "#00ffcc";
                } else if (this.isBurnout) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#ff3300";
                }

                // キャラクター本体描画
                ctx.fillStyle = this.color;
                if (this.state === 'hitstun') ctx.fillStyle = '#ff6666';
                if (this.state === 'guardstun') ctx.fillStyle = '#ffff66';
                if (this.state === 'knockdown' || this.state === 'tech') ctx.fillStyle = '#555555';

                // しゃがみ判定
                let drawHeight = this.height;
                let drawY = this.y;
                if (this.isCrouching && (this.state === 'idle' || this.state === 'walk')) {
                    drawHeight = this.baseHeight * 0.7;
                    drawY = this.y + (this.baseHeight - drawHeight);
                }

                ctx.fillRect(this.x, drawY, this.width, drawHeight);

                // ハチマキ、道着等のセカンドカラーアクセント
                ctx.fillStyle = this.secColor;
                if (this.facing === 1) {
                    ctx.fillRect(this.x + this.width - 25, drawY + 15, 20, 20); // 目印
                } else {
                    ctx.fillRect(this.x + 5, drawY + 15, 20, 20);
                }

                // 攻撃箱判定のアニメーション可視化
                if (this.state === 'attack' && this.currentAttack) {
                    let elapsed = this.currentAttack.total - this.stateTimer;
                    if (elapsed >= this.currentAttack.startup && elapsed < this.currentAttack.startup + this.currentAttack.active) {
                        ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
                        let ax = (this.facing === 1) ? (this.x + this.width) : (this.x - this.currentAttack.boxWidth);
                        let ay = this.y + (this.height + this.currentAttack.boxYOffset);
                        
                        ctx.fillRect(ax, ay, this.currentAttack.boxWidth, this.currentAttack.boxHeight);
                        // データを格納
                        this.attackBox = { x: ax, y: ay, width: this.currentAttack.boxWidth, height: this.currentAttack.boxHeight };
                    }
                }

                ctx.restore();
            }
        }

        // キャラクター同士の物理衝突判定（押し合い）
        function handleCharacterCollision(p1, p2) {
            if (p1.state === 'knockdown' || p2.state === 'knockdown' || p1.state === 'tech' || p2.state === 'tech') return;

            let p1Left = p1.x;
            let p1Right = p1.x + p1.width;
            let p2Left = p2.x;
            let p2Right = p2.x + p2.width;

            // X軸方向の重なりを判定
            if (p1Right > p2Left && p1Left < p2Right) {
                let overlap = 0;
                if (p1.x + p1.width/2 < p2.x + p2.width/2) {
                    overlap = p1Right - p2Left;
                    // 半分ずつお互い外側に押し戻す
                    p1.x -= overlap / 2;
                    p2.x += overlap / 2;
                } else {
                    overlap = p2Right - p1Left;
                    p1.x += overlap / 2;
                    p2.x -= overlap / 2;
                }

                // 画面端制約を再適用
                if (p1.x < 0) p1.x = 0;
                if (p1.x + p1.width > canvas.width) p1.x = canvas.width - p1.width;
                if (p2.x < 0) p2.x = 0;
                if (p2.x + p2.width > canvas.width) p2.x = canvas.width - p2.width;
            }
        }

        // プレイヤーインスタンス
        let player1 = new Fighter({ x: 300, y: 440, color: "#eee", secColor: "#c00", isCPU: false, name: "RYU" });
        let player2 = new Fighter({ x: 880, y: 440, color: "#c00", secColor: "#fc0", isCPU: true, name: "KEN" });

        // 攻撃判定衝突チェック
        function checkHitBoxes(attacker, defender) {
            if (attacker.state !== 'attack' || !attacker.currentAttack) return;
            if (attacker.hasHitThisAttack) return;

            let elapsed = attacker.currentAttack.total - attacker.stateTimer;
            if (elapsed >= attacker.currentAttack.startup && elapsed < attacker.currentAttack.startup + attacker.currentAttack.active) {
                let ab = attacker.attackBox;
                
                // ディフェンダー側の体躯判定
                let dy = defender.isCrouching ? defender.y + (defender.baseHeight * 0.3) : defender.y;
                let dh = defender.isCrouching ? defender.baseHeight * 0.7 : defender.height;

                if (ab.x < defender.x + defender.width &&
                    ab.x + ab.width > defender.x &&
                    ab.y < dy + dh &&
                    ab.y + ab.height > dy) {
                    
                    defender.evaluateHit(attacker.currentAttack, attacker.currentAttack.hitType);
                }
            }
        }

        // --- キーボード入力を絶対レバー方向(1~9)へ変換するロジック ---
        function updateDirNums() {
            // P1
            let right1 = keys['d'] || keys['D'];
            let left1 = keys['a'] || keys['A'];
            let up1 = keys['w'] || keys['W'];
            let down1 = keys['s'] || keys['S'];

            let x1 = 5;
            if (right1) x1 = 6; if (left1) x1 = 4;
            if (down1) {
                if (right1) x1 = 3; else if (left1) x1 = 1; else x1 = 2;
            } else if (up1) {
                if (right1) x1 = 9; else if (left1) x1 = 7; else x1 = 8;
            }
            if (p1CurrentDirNum !== x1) {
                p1CurrentDirNum = x1;
                player1.addCommand(x1);
            }

            // P2
            let right2 = keys['ArrowRight'];
            let left2 = keys['ArrowLeft'];
            let up2 = keys['ArrowUp'];
            let down2 = keys['ArrowDown'];

            let x2 = 5;
            if (right2) x2 = 6; if (left2) x2 = 4;
            if (down2) {
                if (right2) x2 = 3; else if (left2) x2 = 1; else x2 = 2;
            } else if (up2) {
                if (right2) x2 = 9; else if (left2) x2 = 7; else x2 = 8;
            }
            if (p2CurrentDirNum !== x2) {
                p2CurrentDirNum = x2;
                player2.addCommand(x2);
            }
        }

        // キー入力イベント群
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            updateDirNums();

            // ESCでタイトルへ
            if (e.key === 'Escape') {
                backToTitle();
                return;
            }

            // --- 先行入力・技ボタン検知 (P1) ---
            if (!player1.isCPU) {
                // 通常技
                if (e.key === 'j' || e.key === 'J') handlePlayerInput(player1, 'LP', p1CurrentDirNum);
                if (e.key === 'k' || e.key === 'K') handlePlayerInput(player1, 'MP', p1CurrentDirNum);
                if (e.key === 'l' || e.key === 'L') handlePlayerInput(player1, 'HP', p1CurrentDirNum);
                if (e.key === 'u' || e.key === 'U') handlePlayerInput(player1, 'LK', p1CurrentDirNum);
                if (e.key === 'i' || e.key === 'I') handlePlayerInput(player1, 'MK', p1CurrentDirNum);
                if (e.key === 'o' || e.key === 'O') handlePlayerInput(player1, 'HK', p1CurrentDirNum);
                
                // 投げ
                if (e.key === 'y' || e.key === 'Y') player1.tryThrow();
            }

            // P2 (ローカル対戦時)
            if (gameMode === 'local' && !player2.isCPU) {
                if (e.key === '1') handlePlayerInput(player2, 'LP', p2CurrentDirNum);
                if (e.key === '2') handlePlayerInput(player2, 'MP', p2CurrentDirNum);
                if (e.key === '3') handlePlayerInput(player2, 'HP', p2CurrentDirNum);
                if (e.key === '4') handlePlayerInput(player2, 'LK', p2CurrentDirNum);
                if (e.key === '5') handlePlayerInput(player2, 'MK', p2CurrentDirNum);
                if (e.key === '6') handlePlayerInput(player2, 'HK', p2CurrentDirNum);
                if (e.key === '9') player2.tryThrow();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
            updateDirNums();
        });

        function handlePlayerInput(fighter, btnType, dirNum) {
            // 先行入力 or 即時発動
            if (fighter.state !== 'idle' && fighter.state !== 'walk' && fighter.state !== 'attack') {
                fighter.bufferMove(btnType, dirNum);
                return;
            }

            // コマンド必殺技判定の優先チェック
            let isPunch = (btnType==='LP' || btnType==='MP' || btnType==='HP');
            let isKick = (btnType==='LK' || btnType==='MK' || btnType==='HK');

            // ゲージ条件含む超必殺
            if (isPunch && fighter.meter >= 1.0 && fighter.checkSpecialCommand('hadoken') && btnType === 'HP') {
                fighter.startSpecialAttack('shinku_hadoken', 'EX');
                sendAttackNet({attackType:'special', moveName:'shinku_hadoken', strength:'EX'});
                return;
            }

            if (isPunch && fighter.checkSpecialCommand('shoryuken')) {
                fighter.startSpecialAttack('shoryuken', btnType);
                sendAttackNet({attackType:'special', moveName:'shoryuken', strength:btnType});
                return;
            }
            if (isPunch && fighter.checkSpecialCommand('hadoken')) {
                fighter.startSpecialAttack('hadoken', btnType);
                sendAttackNet({attackType:'special', moveName:'hadoken', strength:btnType});
                return;
            }
            if (isKick && fighter.checkSpecialCommand('tatsumaki')) {
                fighter.startSpecialAttack('tatsumaki', btnType);
                sendAttackNet({attackType:'special', moveName:'tatsumaki', strength:btnType});
                return;
            }

            // 通常技キャンセルドライブラッシュ(CR)のトリガーチェック
            // 通常技が当たった直後に強攻撃ボタンを押すことでもラッシュが出せる仕様
            if (fighter.state === 'attack' && !fighter.currentAttack.isSpecial && fighter.hasHitThisAttack && (btnType==='HP' || btnType==='HK')) {
                fighter.tryDriveRush();
                return;
            }

            // 何も必殺技が漏れなければ通常技を発動
            fighter.startNormalAttack(btnType, dirNum);
            sendAttackNet({attackType:'normal', btnType, dirNum});
        }

        // オンライン配信用
        function sendAttackNet(data) {
            if (gameMode === 'online' && socket) {
                data.playerType = myPlayerType;
                socket.emit('playerAttack', data);
            }
        }

        // 超必殺カットイン
        function triggerCutIn(text) {
            const screen = document.getElementById('cutin-screen');
            const txt = document.getElementById('cutin-txt');
            txt.innerText = text;
            screen.classList.add('active');
            setTimeout(() => {
                screen.classList.remove('active');
            }, 1200);
        }

        // ループ処理
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ステージ床
            ctx.fillStyle = '#252525';
            ctx.fillRect(0, 720 - 60, canvas.width, 60);
            ctx.fillStyle = '#ff3300';
            ctx.fillRect(0, 720 - 64, canvas.width, 4);

            // プレイヤー位置移動入力解析
            if (gameActive) {
                handlePlayerMovement(player1, p1CurrentDirNum);
                handlePlayerMovement(player2, p2CurrentDirNum);
            }

            // キャラ物理衝突
            handleCharacterCollision(player1, player2);

            // アップデート
            player1.update(player2);
            player2.update(player1);

            // 攻撃判定交差チェック
            checkHitBoxes(player1, player2);
            checkHitBoxes(player2, player1);

            // トレーニングモード：リフィル機能
            if (gameMode === 'training' && isRefillOn) {
                if (player1.comboCount === 0 && player2.comboCount === 0) {
                    if (player1.hp < 100) player1.hp = Math.min(100, player1.hp + 0.5);
                    if (player2.hp < 100) player2.hp = Math.min(100, player2.hp + 0.5);
                    if (player1.driveGauge < 100 && !player1.isBurnout) player1.driveGauge = Math.min(100, player1.driveGauge + 1);
                    if (player2.driveGauge < 100 && !player2.isBurnout) player2.driveGauge = Math.min(100, player2.driveGauge + 1);
                }
            }

            // 描画
            player1.draw();
            player2.draw();

            // UI反映
            document.getElementById('p1-hp').style.width = player1.hp + '%';
            document.getElementById('p2-hp').style.width = player2.hp + '%';
            player1.refreshDriveUI();
            player2.refreshDriveUI();
            document.getElementById('p1-meter').style.width = (player1.meter * 100) + '%';
            document.getElementById('p2-meter').style.width = (player2.meter * 100) + '%';

            // 先行入力バッファの回収消化
            checkBufferedMove(player1);
            checkBufferedMove(player2);

            // オンライン同期
            if (gameMode === 'online' && socket && gameActive) {
                socket.emit('syncPos', {
                    playerType: myPlayerType, x: (myPlayerType==='p1'?player1.x:player2.x), y: (myPlayerType==='p1'?player1.y:player2.y),
                    state: (myPlayerType==='p1'?player1.state:player2.state), hp: (myPlayerType==='p1'?player1.hp:player2.hp),
                    facing: (myPlayerType==='p1'?player1.facing:player2.facing)
                });
            }
        }

        function checkBufferedMove(fighter) {
            if ((fighter.state === 'idle' || fighter.state === 'walk') && fighter.bufferedInput) {
                if (Date.now() - fighter.bufferedInput.time < INPUT_BUFFER_LIFETIME) {
                    let b = fighter.bufferedInput;
                    fighter.bufferedInput = null;
                    handlePlayerInput(fighter, b.btnType, b.dirNum);
                } else {
                    fighter.bufferedInput = null;
                }
            }
        }

        function handlePlayerMovement(fighter, dirNum) {
            if (fighter.state !== 'idle' && fighter.state !== 'walk' && fighter.state !== 'crouch') return;

            // しゃがみ
            if (dirNum === 1 || dirNum === 2 || dirNum === 3) {
                fighter.state = 'crouch';
                fighter.isCrouching = true;
                fighter.vx = 0;
                return;
            } else {
                fighter.isCrouching = false;
            }

            // 左右移動
            let speed = 5.5;
            if (dirNum === 6) {
                fighter.vx = speed;
            } else if (dirNum === 4) {
                fighter.vx = -speed;
            } else {
                fighter.vx = 0;
            }

            // ジャンプ
            if ((dirNum === 7 || dirNum === 8 || dirNum === 9) && fighter.isGrounded) {
                fighter.vy = -16;
                fighter.isGrounded = false;
                if (dirNum === 9) fighter.vx = speed * 1.2;
                if (dirNum === 7) fighter.vx = -speed * 1.2;
            }
        }

        // --- メニュー＆進行画面遷移ロジック ---
        function showCharacterSelect(mode) {
            gameMode = mode;
            document.getElementById('title-screen').classList.add('hidden');
            document.getElementById('select-screen').classList.remove('hidden');
        }

        function selectChar(idx) {
            p1SelectedIdx = idx;
            p2SelectedIdx = (idx === 0) ? 1 : 0; // 反対側を自動配置
            document.getElementById('card-ryu').classList.remove('selected');
            document.getElementById('card-ken').classList.remove('selected');
            if (idx === 0) document.getElementById('card-ryu').classList.add('selected');
            else document.getElementById('card-ken').classList.add('selected');
        }

        function confirmCharacter() {
            document.getElementById('select-screen').classList.add('hidden');
            
            // モード初期設定
            if (gameMode === 'training') {
                player2.isCPU = true;
                document.getElementById('training-menu').classList.remove('hidden');
            } else if (gameMode === 'local') {
                player2.isCPU = false;
                document.getElementById('training-menu').classList.add('hidden');
            } else if (gameMode === 'online') {
                setupOnlineMock();
            }

            startBattle();
        }

        function startBattle() {
            // キャラ名反映
            player1.name = CHAR_DATA[p1SelectedIdx].name;
            player1.color = CHAR_DATA[p1SelectedIdx].color;
            player1.secColor = CHAR_DATA[p1SelectedIdx].secColor;

            player2.name = CHAR_DATA[p2SelectedIdx].name;
            player2.color = CHAR_DATA[p2SelectedIdx].color;
            player2.secColor = CHAR_DATA[p2SelectedIdx].secColor;

            document.getElementById('p1-name').innerText = player1.name;
            document.getElementById('p2-name').innerText = player2.name;

            // 初期位置リセット
            player1.x = 300; player1.y = 440; player1.hp = 100; player1.driveGauge = 100; player1.meter = 0; player1.state = 'idle'; player1.isBurnout = false;
            player2.x = 880; player2.y = 440; player2.hp = 100; player2.driveGauge = 100; player2.meter = 0; player2.state = 'idle'; player2.isBurnout = false;
            
            battleTimer = gameMode === 'training' ? 99 : 99;
            document.getElementById('game-timer').innerText = battleTimer;

            gameActive = true;

            if (timerInterval) clearInterval(timerInterval);
            if (gameMode !== 'training') {
                timerInterval = setInterval(() => {
                    if (gameActive) {
                        battleTimer--;
                        document.getElementById('game-timer').innerText = battleTimer;
                        if (battleTimer <= 0) {
                            endBattle("TIME UP");
                        }
                    }
                }, 1000);
            } else {
                document.getElementById('game-timer').innerText = "∞";
            }
        }

        function endBattle(reason) {
            gameActive = false;
            clearInterval(timerInterval);
            alert("BATTLE END: " + reason);
            backToTitle();
        }

        function backToTitle() {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('training-menu').classList.add('hidden');
            document.getElementById('select-screen').classList.add('hidden');
            document.getElementById('title-screen').classList.remove('hidden');
            if (socket) { socket.disconnect(); socket = null; }
        }

        // トレーニングパネルクリック操作紐付け
        document.getElementById('btn-dummy-state').addEventListener('click', () => {
            dummyStateSetting = (dummyStateSetting + 1) % DUMMY_STRINGS.length;
            document.getElementById('btn-dummy-state').innerText = DUMMY_STRINGS[dummyStateSetting];
        });
        document.getElementById('btn-dummy-tech').addEventListener('click', () => {
            dummyTechSetting = (dummyTechSetting + 1) % TECH_STRINGS.length;
            document.getElementById('btn-dummy-tech').innerText = TECH_STRINGS[dummyTechSetting];
        });
        document.getElementById('btn-refill').addEventListener('click', () => {
            isRefillOn = !isRefillOn;
            document.getElementById('btn-refill').innerText = isRefillOn ? "ON" : "OFF";
        });

        // モックオンライン設定
        function setupOnlineMock() {
            alert("Mock Online Mode: P2はダミーの自動行動になります。");
            player2.isCPU = true;
            dummyStateSetting = 4; // 初撃以降ガードのコンボ練習モード化
        }

        // 起動時ループ開始
        animate();
    </script>
</body>
</html>
