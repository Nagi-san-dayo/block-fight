<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>BLOCK FIGHT</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #111; color: white; font-family: 'Impact', 'Arial Black', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden; user-select: none;
        }
        .game-wrapper {
            position: relative; width: 1280px; height: 720px;
            box-shadow: 0px 0px 40px rgba(0,0,0,0.8); border: 4px solid #444; background-color: #1a1a1a;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        /* UIレイアウト */
        .ui-container {
            position: absolute; top: 20px; left: 5%; width: 90%;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 10;
        }
        .bar-wrapper { width: 42%; }
        .hp-bar-container { height: 28px; background-color: #442222; border: 3px solid #fff; margin-bottom: 4px; overflow: hidden; }
        .hp-bar { height: 100%; background: linear-gradient(to bottom, #ffcc00, #ff6600); width: 100%; transition: width 0.05s ease-out; }
        
        /* ドライブゲージUI (旧ガードゲージ) */
        .drive-bar-container { 
            height: 18px; background-color: #222; border: 2px solid #555; margin-bottom: 4px; display: flex;
        }
        .drive-stock {
            flex: 1; border-right: 1px solid #111; background-color: #333; position: relative;
        }
        .drive-stock:last-child { border-right: none; }
        .drive-fill {
            height: 100%; background: linear-gradient(to bottom, #44ff44, #00aa00); width: 100%; transition: width 0.1s;
        }
        .drive-burnout .drive-fill { background: linear-gradient(to bottom, #ff4444, #aa0000); }

        .gauge-bar-container { height: 14px; background-color: #222; border: 2px solid #aaa; position: relative; }
        .gauge-bar { height: 100%; background: linear-gradient(to right, #00ffcc, #0099ff); width: 0%; }
        .gauge-text { position: absolute; right: 8px; top: -2px; font-size: 12px; font-weight: bold; color: #fff; text-shadow: 1px 1px #000; }
        
        .combo-counter { position: absolute; top: 100px; font-size: 36px; font-weight: bold; color: #ff3333; text-shadow: 3px 3px #000; opacity: 0; transition: opacity 0.2s; }
        #p1-combo { left: 5%; } #p2-combo { right: 5%; }
        .status-text { font-size: 18px; font-weight: bold; color: #00ffff; height: 22px; text-shadow: 1px 1px #000; }
        .frame-text { font-size: 14px; color: #ffcc00; }

        /* トレーニングパネル */
        #training-panel {
            position: absolute; bottom: 80px; left: 5%; background: rgba(0,0,0,0.7);
            padding: 10px 20px; border-radius: 5px; border: 1px solid #555; font-family: Arial, sans-serif;
            font-size: 14px; color: #fff; display: none; z-index: 10; pointer-events: none;
        }

        /* オンラインルームUI */
        #room-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 20, 0.95); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Arial', sans-serif;
        }
        .room-box { background: #222; padding: 40px; border-radius: 10px; border: 2px solid #444; text-align: center; box-shadow: 0 0 20px rgba(0,210,255,0.3); }
        .room-input { padding: 12px; font-size: 18px; width: 250px; text-align: center; border: 2px solid #555; background: #111; color: #fff; margin-bottom: 20px; font-weight: bold; letter-spacing: 2px; }
        .room-btn { padding: 12px 30px; font-size: 18px; font-weight: bold; cursor: pointer; background: linear-gradient(135deg, #00f0ff, #0077ff); color: white; border: none; border-radius: 5px; transition: 0.2s; }
        .room-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        #room-status { margin-top: 20px; color: #ffcc00; font-weight: bold; min-height: 20px; }
        .back-title-btn { margin-top: 15px; background: #444; color: #fff; padding: 8px 20px; font-size: 14px; border: none; border-radius: 3px; cursor: pointer; }
        .back-title-btn:hover { background: #555; }
    </style>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

    <div class="game-wrapper">
        <div id="room-ui" style="display: none;">
            <div class="room-box">
                <h2 style="color: #00f0ff; margin-top: 0; font-size: 28px; letter-spacing: 1px;">ONLINE ROOM MATCH</h2>
                <p style="color: #aaa; font-size: 14px; margin-bottom: 25px;">ルームIDを入力して対戦に参加してください</p>
                <input type="text" id="room-id-input" class="room-input" placeholder="ROOM ID" maxlength="10"><br>
                <button id="join-room-btn" class="room-btn">ENTER ROOM</button><br>
                <button id="back-to-menu-btn" class="back-title-btn">BACK TO MENU</button>
                <div id="room-status"></div>
                <p style="color: #666; font-size: 12px; margin-top: 20px;">※2人揃うとキャラクター選択へ進みます</p>
            </div>
        </div>

        <div id="game-ui" class="ui-container" style="display: none;">
            <div class="bar-wrapper">
                <div id="p1-name" style="font-size:18px; text-shadow: 2px 2px #000;">PLAYER 1</div>
                <div class="hp-bar-container"><div id="p1-hp" class="hp-bar"></div></div>
                <div class="drive-bar-container" id="p1-drive-container"></div>
                <div class="gauge-bar-container">
                    <div id="p1-gauge" class="gauge-bar"></div>
                    <div id="p1-gauge-text" class="gauge-text">0 / 3</div>
                </div>
                <div id="p1-status" class="status-text"></div>
                <div id="p1-frame" class="frame-text"></div>
            </div>
            <div id="timer" style="font-size: 48px; color: #ffff00; font-weight: bold; text-shadow: 3px 3px #000; align-self: flex-start;">99</div>
            <div class="bar-wrapper" style="text-align: right;">
                <div id="p2-name" style="font-size:18px; text-shadow: 2px 2px #000;">CPU</div>
                <div class="hp-bar-container"><div id="p2-hp" class="hp-bar"></div></div>
                <div class="drive-bar-container" id="p2-drive-container"></div>
                <div class="gauge-bar-container">
                    <div id="p2-gauge" class="gauge-bar"></div>
                    <div id="p2-gauge-text" class="gauge-text">0 / 3</div>
                </div>
                <div id="p2-status" class="status-text"></div>
                <div id="p2-frame" class="frame-text"></div>
            </div>
            
            <div id="p1-combo" class="combo-counter">0 HIT!</div>
            <div id="p2-combo" class="combo-counter">0 HIT!</div>
        </div>

        <div id="training-panel">
            <strong style="color: #00ffcc;">TRAINING MODE CONTROL</strong><br>
            【Tキー】ダミー状態切替: <span id="dummy-state-text" style="color: #ffcc00; font-weight:bold;">STAND</span><br>
            ※体力・ドライブゲージ・パワーゲージはコンボ終了時に自動回復します。
        </div>

        <canvas id="gameCanvas" width="1280" height="720"></canvas>
    </div>

    <script>
        // --- 初期設定・UI生成 ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRAVITY = 0.8;
        const FLOOR_Y = canvas.height - 60;
        
        let gameMode = 'TITLE'; 
        let selectModeIndex = 0; 
        let selectIndex = 0; 
        const CHAR_COLORS = ['#ffffff', '#555555', '#3366ff'];
        const CHAR_NAMES = ['RYU-WHITE', 'GOUKI-BLACK', 'RYU-BLUE'];

        let dummyStateSetting = 0;
        const DUMMY_STRINGS = ['立ち (IDLE)', 'しゃがみ (CROUCH)', '常時ガード (ALWAYS GUARD)', '途中からガード (COMBO GUARD)', 'ジャストパリィ (PARRY)'];

        let socket = null;
        let myPlayerType = null; 
        let currentRoomId = null;
        let isOnlineMode = false;
        let isMyCharReady = false;
        let isOpCharReady = false;

        let cutInTimer = 0;
        let cutInAttacker = null;
        // ==========================================
// 瞬獄殺（一瞬千撃）の演出管理用変数
// ==========================================
let shungokuActive = false;
let shungokuTimer = 0;
let shungokuAttacker = null;
let shungokuTarget = null;
let shungokuFlashes = []; // 画面を切り裂く一閃エフェクトの配列

        const CUTIN_DURATION = 40; 

        // ドライブゲージUIの生成 (6本分)
        function createDriveUI(containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                container.innerHTML += `<div class="drive-stock"><div class="drive-fill" id="${containerId}-stock-${i}"></div></div>`;
            }
        }
        createDriveUI('p1-drive-container');
        createDriveUI('p2-drive-container');

        // --- クラス定義 ---
        class Fireball {
            constructor(x, y, direction, owner, isEX = false, strength = 0) {
                this.x = x; this.y = y;
                this.width = isEX ? 110 : 70; this.height = isEX ? 90 : 60;
                this.speed = (isEX ? 14 : 7 + strength * 2.5) * direction; 
                this.owner = owner; 
                if(owner.name === 'GOUKI-BLACK') {
                    this.name = !owner.isGrounded ? '斬空波動拳' : (isEX ? 'EX灼熱波動拳' : '豪波動拳');
                }else{
                this.name = isEX ? '四角飛角(1G)' : ['弱 四角飛角','中 四角飛角','強 四角飛角'][strength];
                }
                this.damage = isEX ? 18 : 8; 
                this.hitStun = isEX ? 30 : 15; this.guardStun = isEX ? 18 : 10; 
                this.hitType = 'high'; this.isActive = true; this.isEX = isEX; 
                this.hits = isEX ? 3 : 1; this.knockdown = isEX; this.launch = isEX; 
                this.vy = !owner.isGrounded ? 5 : 0;
            }
            update() { 
                this.x += this.speed;
                if (this.x < -100 || this.x > canvas.width + 100) this.isActive = false;
            }
            draw() { 
                if(this.owner.name === 'GOUKI-BLACK'){
                    ctx.fillStyle = this.isEX ? '#ff3300' : '#cc33ff';
                }else{
                ctx.fillStyle = this.isEX ? '#cc33ff' : '#00f3ff'; 
                }
                ctx.beginPath();
                ctx.ellipse(this.x + this.width/2, this.y + this.height/2, this.width/2, this.height/2, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Fighter {
            constructor({ x, y, color, isCPU, name }) {
                this.x = x; this.y = y; this.baseHeight = 220; this.height = this.baseHeight; this.width = 100;
                this.vx = 0; this.vy = 0;
                this.color = color; this.isCPU = isCPU; this.name = name;
                
                this.hp = 100; this.meter = 0.0; 
                
                // ドライブシステム
                this.drive = 6.0; // Max 6.0
                this.isBurnout = false;
                this.burnoutTimer = 0;

                this.facing = 1; this.isGrounded = false; this.state = 'idle'; this.stateTimer = 0;
                this.hitstopTimer = 0; 
                this.currentAttack = null; this.hasHitThisAttack = false; 
                this.comboCount = 0; this.comboDamage = 0; this.comboTimer = 0;
                this.attackBox = { x: 0, y: 0, width: 0, height: 0 }; this.isCrouching = false; 
                this.invincible = false; this.invincibleTimer = 0;
                this.cpuGuardType = null; this.multihitCount = 0; this.multihitTimer = 0;
                this.tatsuSpeed = 0;
                
                this.bufferedInput = null; this.shoryuCancelWindow = 0; this.weakChainCount = 0; 
            }

            addMeter(amount) {
                this.meter = Math.min(3.0, this.meter + amount);
                const id = (this === player1) ? 'p1' : 'p2';
                document.getElementById(`${id}-gauge`).style.width = (this.meter / 3.0 * 100) + '%';
                document.getElementById(`${id}-gauge-text`).innerText = `${this.meter.toFixed(1)} / 3`;
            }

            updateDrive(amount) {
                this.drive = Math.max(0, Math.min(6.0, this.drive + amount));
                const id = (this === player1) ? 'p1' : 'p2';
                
                if (this.drive <= 0 && !this.isBurnout) {
                    this.isBurnout = true;
                    this.burnoutTimer = 600; // 約10秒
                    document.getElementById(`${id}-drive-container`).classList.add('drive-burnout');
                    document.getElementById(`${id}-status`).innerText = 'BURNOUT!!';
                }

                // UI反映
                for (let i = 0; i < 6; i++) {
                    let fillRatio = Math.max(0, Math.min(1, this.drive - i));
                    document.getElementById(`${id}-drive-container-stock-${i}`).style.width = (fillRatio * 100) + '%';
                }
            }

            updateAttackBox() {
                if (this.state === 'attack' && this.currentAttack && !this.currentAttack.isProjectile) {
                    const data = this.currentAttack;
                    this.attackBox.width = data.width; this.attackBox.height = data.height;
                    this.attackBox.y = this.y + data.offsetY;
                    this.attackBox.x = this.facing === 1 ? this.x + data.offsetX : this.x - data.width + (this.width - data.offsetX);
                } else {
                    this.attackBox = { x: 0, y: 0, width: 0, height: 0 };
                }
            }

            draw() {
                if (this.isBurnout && this.state !== 'attack' && this.state !== 'hitstun') ctx.fillStyle = '#666'; // バーンアウト中は少し暗く
                else if (this.invincible && this.state !== 'knockdown') ctx.fillStyle = '#ffff66'; 
                else if (this.state === 'knockdown') ctx.fillStyle = '#884444';
                else if (this.state === 'air_hit') ctx.fillStyle = '#ff66cc'; 
                else if (this.state === 'hitstun') ctx.fillStyle = '#ff4444';
                else if (this.state === 'guardstun') ctx.fillStyle = '#44ff44';
                else if (this.state === 'attack' && this.currentAttack && this.currentAttack.name.includes('BLOCK RUSH')) ctx.fillStyle = '#44ff88'; // ラッシュ中
                else if (this.state === 'attack') ctx.fillStyle = '#ffaa00';
                else {
                    if (this === player1 && activeMoveKey === 'x') ctx.fillStyle = '#ffffff';
                    else ctx.fillStyle = this.color;
                }
                
                let drawHeight = this.state === 'knockdown' ? this.baseHeight * 0.3 : this.height;
                let drawY = this.state === 'knockdown' ? this.y + (this.baseHeight - drawHeight) : this.y;
                ctx.fillRect(this.x, drawY, this.width, drawHeight);
                
                ctx.fillStyle = '#000';
                let eyeX = this.facing === 1 ? this.x + this.width - 25 : this.x + 15;
                if(this.state !== 'knockdown') ctx.fillRect(eyeX, drawY + 25, 15, 15);
                
                // 攻撃判定の可視化
                if (this.state === 'attack' && this.attackBox.width > 0) {
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
                    ctx.fillRect(this.attackBox.x, this.attackBox.y, this.attackBox.width, this.attackBox.height);
                }
            }

            update(currentDirNum) {
                    // 瞬獄殺の演出中は、キャラ個別タイマーや位置更新などの通常処理をすべてストップ
    if (shungokuActive) {
        if (this === shungokuAttacker || this === shungokuTarget) {
            this.vx = 0; this.vy = 0;
            return; 
        }
    }
                if (this.hitstopTimer > 0) {
                    this.hitstopTimer--;
                    return; 
                }

                if (this.invincibleTimer > 0) {
                    this.invincibleTimer--;
                    this.invincible = true;
                } else if (this.state === 'idle' && !this.currentAttack) {
                    this.invincible = false;
                }

                if (this.shoryuCancelWindow > 0) this.shoryuCancelWindow--;
                
                // ドライブ・バーンアウト更新
                const id = (this === player1) ? 'p1' : 'p2';
                if (this.isBurnout) {
                    this.burnoutTimer--;
                    if (this.burnoutTimer <= 0) {
                        this.isBurnout = false;
                        this.updateDrive(6.0); // 全回復
                        document.getElementById(`${id}-drive-container`).classList.remove('drive-burnout');
                    }
                } else if (this.state !== 'attack' && this.state !== 'hitstun' && this.state !== 'guardstun') {
                    // 自然回復
                    this.updateDrive(0.005);
                }

                let prevHeight = this.height;
                const disableCrouchStates = ['attack', 'hitstun', 'guardstun', 'knockdown', 'air_hit', 'dash'];
                if (!disableCrouchStates.includes(this.state) && [1, 2, 3].includes(currentDirNum)) {
                    this.isCrouching = true; this.height = this.baseHeight * 0.7;
                } else if (!disableCrouchStates.includes(this.state)) {
                    this.isCrouching = false; this.height = this.baseHeight;
                }

                if (this.height !== prevHeight && this.isGrounded) {
                    this.y += (prevHeight - this.height);
                }

                // 竜巻中の移動処理（状態タイマーによる強制リセットを削除）
                if (this.state === 'attack' && this.currentAttack && this.currentAttack.name.includes('回転')) {
                    this.vx = this.tatsuSpeed;
                }

                this.y += this.vy;
                if (this.y + this.height >= FLOOR_Y) {
                    this.y = FLOOR_Y - this.height;
                    this.vy = 0; 
                    this.isGrounded = true;
                    
                    if (this.state === 'air_hit') {
                        this.state = 'knockdown'; this.stateTimer = 50; this.vx = 0;
                    } else if (this.state === 'knockdown' || this.state === 'dash') {
                        this.vx = 0;
                    }
                } else { 
                    this.vy += GRAVITY; this.isGrounded = false; 
                }

                this.x += this.vx;
                // 画面端
                if (this.x < 0) { this.x = 0; if(this.state === 'dash') this.vx = 0; }
                if (this.x + this.width > canvas.width) { this.x = canvas.width - this.width; if(this.state === 'dash') this.vx = 0; }

                this.updateAttackBox();
                    // 瞬獄殺の掴み判定チェック（移動投げ）
    let targetFighter = (this === player1) ? player2 : player1;
    if (this.state === 'attack' && this.currentAttack && this.currentAttack.isShunGokuSatsu) {
        let dist = Math.abs((this.x + this.width/2) - (targetFighter.x + targetFighter.width/2));
        
        // 相手が近くにいて、地上かつ無敵状態でなければ掴み成立
        if (dist < 120 && targetFighter.isGrounded && !targetFighter.invincible && targetFighter.state !== 'knockdown') {
            shungokuActive = true;
            shungokuTimer = 130; // 演出の総フレーム数（約2秒強）
            shungokuAttacker = this;
            shungokuTarget = targetFighter;
            shungokuFlashes = [];
            
            // お互いのステートを演出用にロック
            this.state = 'attack';
            this.stateTimer = 130;
            this.vx = 0; this.vy = 0;
            
            targetFighter.state = 'hitstun';
            targetFighter.stateTimer = 130;
            targetFighter.vx = 0; targetFighter.vy = 0;
            
            this.currentAttack = null; // 掴み判定を消去
        }
    }

                if (this.multihitCount > 0) {
                    this.multihitTimer--;
                    if (this.multihitTimer <= 0) {
                        this.multihitTimer = 7;
                        this.multihitCount--; this.hasHitThisAttack = false; 
                        let target = (this === player1) ? player2 : player1;
                        if (checkCollision(this.attackBox, target)) {
                            target.evaluateHit(this.currentAttack, 'high');
                            this.hasHitThisAttack = true; this.addMeter(0.05);
                        }
                    }
                }

                if (this.stateTimer > 0) {
                    this.stateTimer--;
                    if (this.stateTimer === 0) { 
                        if (this.state === 'knockdown') {
                            this.state = 'idle'; this.invincibleTimer = 20; this.height = this.baseHeight;
                        } else {
                            this.state = 'idle'; this.currentAttack = null; this.multihitCount = 0;
                            this.attackBox = { x: 0, y: 0, width: 0, height: 0 }; this.weakChainCount = 0;
                        }

                        // 先行入力猶予の拡大（150ms -> 300ms）
                        if (this.state === 'idle' && this.bufferedInput && (Date.now() - this.bufferedInput.time < 300)) {
                            let b = this.bufferedInput; this.bufferedInput = null; 
                            if (b.type === 'special') {
                                if (b.strength === 3) {
                                    if (this.meter >= 1.0) { this.meter -= 1.0; let successEX = this.startSpecialAttack(b.moveName, 3); if (!successEX) this.meter += 1.0; }
                                } else { this.startSpecialAttack(b.moveName, b.strength); }
                            } else if (b.type === 'normal') {
                                this.startNormalAttack(b.key, b.dir);
                            } else if (b.type === 'dash') {
                                this.startDriveRush();
                            }
                        }
                    }
                }

                if (this.comboTimer > 0) {
                    this.comboTimer--;
                    if (this.comboTimer === 0) {
                        this.comboCount = 0; this.comboDamage = 0; document.getElementById(`${id}-combo`).style.opacity = 0;
                    }
                }
            }

            startDriveRush() {
                if (this.state !== 'idle' || !this.isGrounded || this.isBurnout || this.drive < 1.0) return false;
                this.updateDrive(-1.0); // 生ラッシュは1ゲージ消費
                this.state = 'attack'; // 便宜上attack状態として扱う
                this.stateTimer = 25; // ラッシュ継続時間
                this.vx = this.facing * 14; // 高速移動
                this.currentAttack = { name: 'BLOCK RUSH', isDash: true };
                document.getElementById((this === player1) ? 'p1-status' : 'p2-status').innerText = 'BLOCK RUSH';
                return true;
            }

            startCancelDriveRush() {
                if (this.isBurnout || this.drive < 3.0) return false;
                this.updateDrive(-3.0); // キャンセルラッシュは3ゲージ消費
                this.state = 'attack';
                this.stateTimer = 20;
                this.hitstopTimer = 0; // ヒットストップをキャンセル
                this.vx = this.facing * 16;
                this.currentAttack = { name: 'CANCEL RUSH', isDash: true };
                document.getElementById((this === player1) ? 'p1-status' : 'p2-status').innerText = 'CANCEL RUSH';
                return true;
            }

            startNormalAttack(btnType, dirNum) {
                if (this.state === 'hitstun' || this.state === 'guardstun' || this.state === 'knockdown' || this.state === 'air_hit') return false;
                
                // キャンセルラッシュの判定
                if (this.state === 'attack' && this.currentAttack && !this.currentAttack.isProjectile && !this.currentAttack.isDash) {
                    if (this.hasHitThisAttack && this.currentAttack.cancelable) {
                        // パリィボタン(Space等)または 66 入力
                        if (btnType === 'dash_macro') {
                            return this.startCancelDriveRush();
                        }
                    }
                }

                let isPunch = ['j', 'k', 'l'].includes(btnType);
                let isKick = ['u', 'i', 'o'].includes(btnType);
                let strengthNum = ['j', 'u'].includes(btnType) ? 0 : (['k', 'i'].includes(btnType) ? 1 : 2); 
                let strengthName = ['弱', '中', '強'][strengthNum];
                let typeName = isPunch ? 'P' : 'K';
                
                let isCrouching = [1, 2, 3].includes(dirNum) && this.isGrounded;
                let isJumping = !this.isGrounded;
                if(this.name === 'GOUKI-BLACK' && isJumping && [1,2,3].includes(dirNum) && isKick && strengthNum === 1){

            let p2Center = player2.x + player2.width / 2;
            let dist = Math.abs(p1Center - p2Center);
            
            // キャラクターの幅(100)より近づいたら押し出し
            if (dist < player1.width) {
                let overlap = (player1.width - dist) / 2;
                if (p1Center < p2Center) {
                    player1.x -= overlap; player2.x += overlap;
                } else {
                    player1.x += overlap; player2.x -= overlap;
                }
                // 画面端の考慮
                if (player1.x < 0) { player1.x = 0; player2.x += overlap*2; }
                if (player2.x > canvas.width - player2.width) { player2.x = canvas.width - player2.width; player1.x -= overlap*2; }
                if (player2.x < 0) { player2.x = 0; player1.x += overlap*2; }
                if (player1.x > canvas.width - player1.width) { player1.x = canvas.width - player1.width; player2.x -= overlap*2; }

            if (['j','k','l','u','i','o',' '].includes(key) || isSpace) {
                const currentDir = getJoystickDirection(myFighter);
                let strength = ['j','u'].includes(key) ? 0 : (['k','i'].includes(key) ? 1 : 2);
                if (isSpace) strength = 3;

                // 生ラッシュ (66 または パリィ+前)
                if (checkCommand('66') || (isSpace && currentDir === 6)) {
                    if (myFighter.startDriveRush()) {
                        inputBuffer = [];
                        return;
                    } else {
                        myFighter.bufferedInput = { type: 'dash', time: Date.now() };
                    }
                }

                if ((key === 'l' || key === 'o') && (currentDir === 4 || currentDir === 6)) {
                    if (myFighter.tryThrow()) { inputBuffer = []; return; }
                }

                let success = false;
                let isSpecial = false;

                // 236コマンド
                if ((checkCommand('236') || checkCommand('26')) && (['j','k','l',' '].includes(key) || isSpace)) {
                    isSpecial = true;
                    if (strength === 3) { success = myFighter.startSpecialAttack('hadouken', 3); } 
                    else { success = myFighter.startSpecialAttack('hadouken', strength); }
                    if (!success) myFighter.bufferedInput = { type: 'special', moveName: 'hadouken', strength: strength, time: Date.now() };
                    inputBuffer = [];
                }
                // 623コマンド + パンチ（昇竜拳）
                else if (checkCommand('623') && (['j','k','l',' '].includes(key) || isSpace)) {
                    isSpecial = true;
                    if (strength === 3) { success = myFighter.startSpecialAttack('shoryuken', 3); } 
                    else { success = myFighter.startSpecialAttack('shoryuken', strength); }
                    if (!success) myFighter.bufferedInput = { type: 'special', moveName: 'shoryuken', strength: strength, time: Date.now() };
                    inputBuffer = [];
                }
                // === 623コマンド + キック（百鬼襲）を追加 ===
                else if (checkCommand('623') && ['u','i','o'].includes(key)) {
                    isSpecial = true;
                    if (myFighter.name === 'GOUKI-BLACK') {
                        success = myFighter.startSpecialAttack('hyakkishu', strength);
                        if (!success) myFighter.bufferedInput = { type: 'special', moveName: 'hyakkishu', strength: strength, time: Date.now() };
                    }
                    inputBuffer = [];
                }
                // 214コマンド
                else if ((checkCommand('214') || checkCommand('24')) && (['u','i','o',' '].includes(key) || isSpace)) {
                    isSpecial = true;
                    if (strength === 3) { success = myFighter.startSpecialAttack('tatsumaki', 3); } 
                    else { success = myFighter.startSpecialAttack('tatsumaki', strength); }
                    if (!success) myFighter.bufferedInput = { type: 'special', moveName: 'tatsumaki', strength: strength, time: Date.now() };
                    inputBuffer = [];
                }
                // 阿修羅閃空
                else if ((checkCommand('236') || checkCommand('26')) && ['u','i','o'].includes(key)) {
                    isSpecial = true;
                    success = myFighter.startSpecialAttack('teleport', strength);
                    if (!success) myFighter.bufferedInput = { type: 'special', moveName: 'teleport', strength: strength, time: Date.now() };
                    inputBuffer = [];
                }

                if (!isSpecial) {
                    let actBtn = isSpace ? 'dash_macro' : key;
                    success = myFighter.startNormalAttack(actBtn, currentDir);
                    if (!success) myFighter.bufferedInput = { type: 'normal', key: actBtn, dir: currentDir, time: Date.now() };
                }

                if (success) myFighter.bufferedInput = null;
            }

            }
        );

        window.addEventListener('keyup', (event) => {
            const key = event.key.toLowerCase();
            if (['q','w','e','a','d','z','x','c'].includes(key)) {
                const index = moveKeyStack.indexOf(key); if (index > -1) moveKeyStack.splice(index, 1);
                activeMoveKey = moveKeyStack.length > 0 ? moveKeyStack[moveKeyStack.length - 1] : null;
            }
        });

        document.getElementById('back-to-menu-btn').addEventListener('click', () => { document.getElementById('room-ui').style.display = 'none'; gameMode = 'TITLE'; });
        document.getElementById('join-room-btn').addEventListener('click', () => {
            const roomId = document.getElementById('room-id-input').value.trim();
            if (!roomId) { alert("ルームIDを入力してください。"); return; }
            socket = io("https://block-fight.onrender.com/");
            currentRoomId = roomId; document.getElementById('room-status').innerText = "サーバーに接続中...";
            socket.emit('joinRoom', roomId);
            socket.on('playerAssigned', (type) => { myPlayerType = type; document.getElementById('room-status').innerText = `【ROOM: ${roomId}】 ${type.toUpperCase()} として接続完了。対戦相手を待っています...`; });
            socket.on('roomFull', () => { document.getElementById('room-status').innerText = "ルームが満員です。別のIDを試してください。"; });
            socket.on('matchStart', () => {
                document.getElementById('room-status').innerText = "マッチング成功！ゲームを開始します。";
                setTimeout(() => { document.getElementById('room-ui').style.display = 'none'; isOnlineMode = true; gameMode = 'CHAR_SELECT'; }, 1000);
            });
            socket.on('opponentUpdate', (data) => {
                let opFighter = (data.playerType === 'p1') ? player1 : player2; if (!opFighter) return;
                opFighter.x = data.x; opFighter.y = data.y; opFighter.vx = data.vx; opFighter.vy = data.vy; opFighter.state = data.state; opFighter.hp = data.hp; opFighter.facing = data.facing; opFighter.isCrouching = data.isCrouching; opFighter.height = data.height;
                if (data.playerType === 'p2') player2MoveKey = data.activeMoveKey;
                const id = (data.playerType === 'p1') ? 'p1-hp' : 'p2-hp'; document.getElementById(id).style.width = data.hp + '%';
            });
            socket.on('opponentAttack', (data) => {
                let opFighter = (data.playerType === 'p1') ? player1 : player2; if (!opFighter) return;
                if (data.attackType === 'normal') opFighter.startNormalAttack(data.btnType, data.dirNum);
                else if (data.attackType === 'special') opFighter.startSpecialAttack(data.moveName, data.strength);
                else if (data.attackType === 'throw') opFighter.tryThrow();
            });
            socket.on('opponentCharacterSelected', (data) => {
                 if (data.playerType !== myPlayerType) {
                    isOpCharReady = true;
                    if(isMyCharReady)
                  startBattle();}
                 });
            socket.on('opponentDisconnected', () => { alert("対戦相手が切断されました。タイトルに戻ります。"); location.reload(); });
        });

        animate();
    </script>
</body>
</html>
